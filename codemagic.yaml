workflows:
  ios-testflight-release:
    name: Build and upload signed iOS release
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: zuko-app-store
    environment:
      xcode: 26.3
      cocoapods: 1.16.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dev.adonm.zuko
      vars:
        MISE_LOG_LEVEL: info
        MISE_AUTO_INSTALL: "0"
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
        TEAM_ID: R8PN382RC4
    cache:
      cache_paths:
        - $HOME/.cache/mise
        - $HOME/.local/share/mise
        - $HOME/.pub-cache
    scripts:
      - name: Verify immutable release identity
        script: |
          set -euo pipefail
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"

      - name: Install pinned repository toolchain
        script: scripts/install-mise-codemagic.sh

      - name: Install pinned Codemagic CLI Tools
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          scripts/install-codemagic.sh
          "$RUNNER_TEMP/zuko-codemagic-cli/bin/codemagic-cli-tools" --version
          echo "RUNNER_TEMP=$RUNNER_TEMP" >> "$CM_ENV"

      - name: Verify Xcode 26.3
        script: $HOME/.local/bin/mise exec -- just select-xcode

      - name: Prepare App Store-compatible Ghostty library
        script: $HOME/.local/bin/mise exec -- just prepare-ios-ghostty

      - name: Configure App Store signing
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          export APPLE_EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/flutter/ios/Runner.xcodeproj" \
            --archive-method app-store \
            --export-options-plist "$APPLE_EXPORT_OPTIONS" \
            --custom-export-options '{"destination":"export","manageAppVersionAndBuildNumber":false,"stripSwiftSymbols":true,"uploadSymbols":true}'
          plutil -lint "$APPLE_EXPORT_OPTIONS"
          {
            echo "RUNNER_TEMP=$RUNNER_TEMP"
            echo "APPLE_EXPORT_OPTIONS=$APPLE_EXPORT_OPTIONS"
          } >> "$CM_ENV"

      - name: Build signed Flutter IPA
        script: $HOME/.local/bin/mise exec -- just build-ios-store

      - name: Validate and package signed IPA
        script: $HOME/.local/bin/mise exec -- just package-ios-store

    artifacts:
      - dist/flutter-ios/Zuko-Flutter.ipa
      - dist/flutter-ios/Zuko-Flutter.ipa.sha256
      - flutter/build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false

  mobile-appetize-release:
    name: Upload immutable mobile previews
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      groups:
        - appetize_credentials
      vars:
        CM_CLONE_UNSHALLOW: true
    scripts:
      - name: Verify immutable release identity
        script: |
          if [ -n "${APPETIZE_RELEASE_TAG:-}" ]; then
            test -z "${CM_TAG:-}"
            test "${CM_BRANCH:-}" = main
            [[ "$APPETIZE_RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
            [[ "${APPETIZE_RELEASE_SHA:-}" =~ ^[0-9a-f]{40}$ ]]
            git fetch origin \
              "refs/tags/$APPETIZE_RELEASE_TAG:refs/tags/$APPETIZE_RELEASE_TAG"
            test "$(git cat-file -t "$APPETIZE_RELEASE_TAG")" = tag
            test "$(git rev-parse "$APPETIZE_RELEASE_TAG^{commit}")" = \
              "$APPETIZE_RELEASE_SHA"
            git checkout --detach "$APPETIZE_RELEASE_SHA"
            release_tag="$APPETIZE_RELEASE_TAG"
          else
            test -n "${CM_TAG:-}"
            test "$(git rev-parse HEAD)" = "$CM_COMMIT"
            release_tag="$CM_TAG"
          fi
          scripts/release-context.sh "$release_tag"
          echo "APPETIZE_TAG=$release_tag" >> "$CM_ENV"

      - name: Verify Appetize configuration
        script: |
          test -n "${APPETIZE_API_TOKEN:-}"
          [[ "${APPETIZE_ANDROID_PUBLIC_KEY:-}" =~ ^[A-Za-z0-9_-]+$ ]]
          [[ "${APPETIZE_IOS_PUBLIC_KEY:-}" =~ ^[A-Za-z0-9_-]+$ ]]

      - name: Download exact release previews
        script: |
          set -euo pipefail
          base="https://github.com/adonm/zuko/releases/download/$APPETIZE_TAG"
          mkdir -p dist/appetize
          for asset in \
            "zuko-android-$APPETIZE_TAG-signed.apk" \
            "zuko-android-$APPETIZE_TAG-signed.apk.sha256" \
            Zuko-Flutter-ios-simulator.zip \
            Zuko-Flutter-ios-simulator.zip.sha256; do
            curl --fail --silent --show-error --location \
              --proto '=https' --tlsv1.2 "$base/$asset" \
              -o "dist/appetize/$asset"
          done
          (cd dist/appetize && sha256sum --check \
            "zuko-android-$APPETIZE_TAG-signed.apk.sha256")
          (cd dist/appetize && sha256sum --check \
            Zuko-Flutter-ios-simulator.zip.sha256)
          unzip -t dist/appetize/Zuko-Flutter-ios-simulator.zip >/dev/null

      - name: Upload Android preview
        script: |
          sh scripts/upload-appetize.sh android \
            "dist/appetize/zuko-android-$APPETIZE_TAG-signed.apk" \
            "$APPETIZE_ANDROID_PUBLIC_KEY" \
            "Zuko $APPETIZE_TAG release"

      - name: Upload iOS Simulator preview
        script: |
          sh scripts/upload-appetize.sh ios \
            dist/appetize/Zuko-Flutter-ios-simulator.zip \
            "$APPETIZE_IOS_PUBLIC_KEY" \
            "Zuko $APPETIZE_TAG iOS Simulator release"
