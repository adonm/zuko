workflows:
  ios-signing-validation:
    name: Signed iOS release candidate
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: zuko-app-store
    environment: &ios_environment
      xcode: 26.3
      cocoapods: 1.16.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dev.adonm.zuko
      vars:
        MISE_LOG_LEVEL: info
        MISE_AUTO_INSTALL: "0"
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
        TEAM_ID: R8PN382RC4
    cache: &ios_cache
      cache_paths:
        - $HOME/.cache/mise
        - $HOME/.local/share/mise
        - $HOME/.pub-cache
    scripts:
      - name: Verify exact candidate identity
        script: |
          set -euo pipefail
          [[ "${RELEASE_CANDIDATE_TAG:-}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "${RELEASE_CANDIDATE_SHA:-}" =~ ^[0-9a-f]{40}$ ]]
          expected_branch="release-candidate/$RELEASE_CANDIDATE_TAG-${RELEASE_CANDIDATE_SHA:0:12}"
          test "${RELEASE_CANDIDATE_BRANCH:-}" = "$expected_branch"
          test "${CM_BRANCH:-}" = "$expected_branch"
          test -z "${CM_TAG:-}"
          test "$CM_COMMIT" = "$RELEASE_CANDIDATE_SHA"
          test "$(git rev-parse HEAD)" = "$RELEASE_CANDIDATE_SHA"
          scripts/release-context.sh
          version="$(scripts/version.sh)"
          IFS=. read -r major minor patch <<< "$version"
          build_number=$((1800000000 + major * 1000000 + minor * 1000 + patch))
          test "$RELEASE_CANDIDATE_TAG" = "v$version"
          if [ -n "${IOS_BUILD_NUMBER_OVERRIDE:-}" ]; then
            [[ "$IOS_BUILD_NUMBER_OVERRIDE" =~ ^[0-9]+$ ]]
            test "$IOS_BUILD_NUMBER_OVERRIDE" -gt "$build_number"
            test "$IOS_BUILD_NUMBER_OVERRIDE" -le 2100000000
            echo "ZUKO_BUILD_NUMBER=$IOS_BUILD_NUMBER_OVERRIDE" >> "$CM_ENV"
          fi

      - &install_toolchain
        name: Install pinned repository toolchain
        script: scripts/install-mise-codemagic.sh

      - &install_codemagic_cli
        name: Install pinned Codemagic CLI Tools
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          scripts/install-codemagic.sh
          "$RUNNER_TEMP/zuko-codemagic-cli/bin/codemagic-cli-tools" --version
          echo "RUNNER_TEMP=$RUNNER_TEMP" >> "$CM_ENV"

      - name: Verify Xcode 26.3
        script: $HOME/.local/bin/mise exec -- just select-xcode

      - name: Prepare App Store-compatible Ghostty library
        script: $HOME/.local/bin/mise exec -- just prepare-ios-ghostty

      - name: Configure App Store signing
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          export APPLE_EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/flutter/ios/Runner.xcodeproj" \
            --archive-method app-store \
            --export-options-plist "$APPLE_EXPORT_OPTIONS" \
            --custom-export-options '{"destination":"export","manageAppVersionAndBuildNumber":false,"stripSwiftSymbols":true,"uploadSymbols":true}'
          plutil -lint "$APPLE_EXPORT_OPTIONS"
          {
            echo "RUNNER_TEMP=$RUNNER_TEMP"
            echo "APPLE_EXPORT_OPTIONS=$APPLE_EXPORT_OPTIONS"
          } >> "$CM_ENV"

      - name: Build signed Flutter IPA
        script: $HOME/.local/bin/mise exec -- just build-ios-store

      - name: Validate and package signed IPA
        script: $HOME/.local/bin/mise exec -- just package-ios-store

    artifacts: &ios_artifacts
      - dist/flutter-ios/Zuko-Flutter.ipa
      - dist/flutter-ios/Zuko-Flutter.ipa.sha256
      - flutter/build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*

  ios-testflight-release:
    name: Upload validated IPA to TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: zuko-app-store
    environment:
      groups:
        - codemagic_api
      xcode: 26.3
      vars:
        CM_CLONE_UNSHALLOW: true
        TEAM_ID: R8PN382RC4
    scripts:
      - name: Verify immutable release identity
        script: |
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"

      - *install_codemagic_cli

      - name: Verify Xcode 26.3
        script: scripts/select-xcode.sh

      - name: Download validated IPA for tagged commit
        script: |
          [[ "${IOS_VALIDATION_BUILD_ID:-}" =~ ^[0-9a-f]{24}$ ]]
          mkdir -p dist/flutter-ios
          build_json="$RUNNER_TEMP/build.json"
          curl --fail --silent --show-error \
            --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
            "https://api.codemagic.io/builds/$IOS_VALIDATION_BUILD_ID" \
            > "$build_json"
          selection="$(
            python3 scripts/select-codemagic-ios-artifact.py \
              "$build_json" "$CM_COMMIT"
          )"
          source_build_id="$(sed -n 's/^source_build_id=//p' <<< "$selection")"
          artifact_url="$(sed -n 's/^artifact_url=//p' <<< "$selection")"
          test "$source_build_id" = "$IOS_VALIDATION_BUILD_ID"
          test -n "$artifact_url"
          curl --fail --silent --show-error --location \
            --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
            "$artifact_url" \
            -o dist/flutter-ios/Zuko-Flutter.ipa
          ipa_sha="$(shasum -a 256 dist/flutter-ios/Zuko-Flutter.ipa | awk '{print $1}')"
          printf '%s  %s\n' "$ipa_sha" Zuko-Flutter.ipa \
            > dist/flutter-ios/Zuko-Flutter.ipa.sha256

      - name: Revalidate tagged IPA
        script: |
          mkdir -p "$RUNNER_TEMP/recovered.xcarchive"
          scripts/apple-validate-package.sh \
            "$RUNNER_TEMP/recovered.xcarchive" \
            "$CM_BUILD_DIR/dist/flutter-ios/Zuko-Flutter.ipa" \
            "$ZUKO_VERSION" "$ZUKO_BUILD_NUMBER"

    artifacts: *ios_artifacts
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false

  mobile-appetize-release:
    name: Upload immutable mobile previews
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      groups:
        - appetize_credentials
      vars:
        CM_CLONE_UNSHALLOW: true
    scripts:
      - name: Verify immutable release identity
        script: |
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"
          echo "APPETIZE_TAG=$CM_TAG" >> "$CM_ENV"

      - name: Verify Appetize configuration
        script: |
          test -n "${APPETIZE_API_TOKEN:-}"
          [[ "${APPETIZE_ANDROID_PUBLIC_KEY:-}" =~ ^[A-Za-z0-9_-]+$ ]]
          [[ "${APPETIZE_IOS_PUBLIC_KEY:-}" =~ ^[A-Za-z0-9_-]+$ ]]

      - name: Download exact release previews
        script: |
          set -euo pipefail
          base="https://github.com/adonm/zuko/releases/download/$APPETIZE_TAG"
          mkdir -p dist/appetize
          for asset in \
            "zuko-android-$APPETIZE_TAG-signed.apk" \
            "zuko-android-$APPETIZE_TAG-signed.apk.sha256" \
            Zuko-Flutter-ios-simulator.zip \
            Zuko-Flutter-ios-simulator.zip.sha256; do
            curl --fail --silent --show-error --location \
              --proto '=https' --tlsv1.2 "$base/$asset" \
              -o "dist/appetize/$asset"
          done
          (cd dist/appetize && sha256sum --check \
            "zuko-android-$APPETIZE_TAG-signed.apk.sha256")
          (cd dist/appetize && sha256sum --check \
            Zuko-Flutter-ios-simulator.zip.sha256)
          unzip -t dist/appetize/Zuko-Flutter-ios-simulator.zip >/dev/null

      - name: Upload Android preview
        script: |
          scripts/upload-appetize.sh android \
            "dist/appetize/zuko-android-$APPETIZE_TAG-signed.apk" \
            "$APPETIZE_ANDROID_PUBLIC_KEY" \
            "Zuko $APPETIZE_TAG release"

      - name: Upload iOS Simulator preview
        script: |
          scripts/upload-appetize.sh ios \
            dist/appetize/Zuko-Flutter-ios-simulator.zip \
            "$APPETIZE_IOS_PUBLIC_KEY" \
            "Zuko $APPETIZE_TAG iOS Simulator release"
