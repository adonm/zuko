workflows:
  ios-signing-validation:
    name: iOS signing validation
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: zuko-app-store
    environment: &ios_environment
      xcode: 26.3
      cocoapods: 1.16.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dev.adonm.zuko
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
        TEAM_ID: R8PN382RC4
    cache: &ios_cache
      cache_paths:
        - $HOME/.cache/mise
        - $HOME/.local/share/mise
        - $HOME/.pub-cache
    scripts:
      - &install_toolchain
        name: Install pinned repository toolchain
        script: scripts/install-mise-codemagic.sh

      - &install_codemagic_cli
        name: Install pinned Codemagic CLI Tools
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          scripts/install-codemagic.sh
          "$RUNNER_TEMP/zuko-codemagic-cli/bin/codemagic-cli-tools" --version
          echo "RUNNER_TEMP=$RUNNER_TEMP" >> "$CM_ENV"

      - name: Resolve validation metadata
        script: |
          $HOME/.local/bin/mise exec -- just build-context
          if [ -n "${IOS_BUILD_NUMBER_OVERRIDE:-}" ]; then
            [[ "$IOS_BUILD_NUMBER_OVERRIDE" =~ ^[0-9]+$ ]]
            version="$(scripts/version.sh)"
            IFS=. read -r major minor patch <<< "$version"
            base_build=$((1800000000 + major * 1000000 + minor * 1000 + patch))
            test "$IOS_BUILD_NUMBER_OVERRIDE" -gt "$base_build"
            test "$IOS_BUILD_NUMBER_OVERRIDE" -le 2100000000
            echo "ZUKO_BUILD_NUMBER=$IOS_BUILD_NUMBER_OVERRIDE" >> "$CM_ENV"
          fi

      - &select_xcode
        name: Verify Xcode 26.3
        script: $HOME/.local/bin/mise exec -- just select-xcode

      - &flutter_check
        name: Analyze and test shared client
        script: $HOME/.local/bin/mise exec -- just flutter-check

      - &prepare_ghostty
        name: Prepare App Store-compatible Ghostty library
        script: $HOME/.local/bin/mise exec -- just prepare-ios-ghostty

      - &configure_signing
        name: Configure App Store signing
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          export APPLE_EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/flutter/ios/Runner.xcodeproj" \
            --archive-method app-store \
            --export-options-plist "$APPLE_EXPORT_OPTIONS" \
            --custom-export-options '{"destination":"export","manageAppVersionAndBuildNumber":false,"stripSwiftSymbols":true,"uploadSymbols":true}'
          plutil -lint "$APPLE_EXPORT_OPTIONS"
          {
            echo "RUNNER_TEMP=$RUNNER_TEMP"
            echo "APPLE_EXPORT_OPTIONS=$APPLE_EXPORT_OPTIONS"
          } >> "$CM_ENV"

      - &build_ipa
        name: Build signed Flutter IPA
        script: $HOME/.local/bin/mise exec -- just build-ios-store

      - &package_ipa
        name: Validate and package signed IPA
        script: $HOME/.local/bin/mise exec -- just package-ios-store

    artifacts: &ios_artifacts
      - dist/flutter-ios/Zuko-Flutter.ipa
      - dist/flutter-ios/Zuko-Flutter.ipa.sha256
      - flutter/build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*

  ios-testflight-release:
    name: iOS TestFlight release
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: zuko-app-store
    environment:
      groups:
        - codemagic_api
      xcode: 26.3
      vars:
        CM_CLONE_UNSHALLOW: true
        TEAM_ID: R8PN382RC4
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: false
    scripts:
      - name: Verify immutable release identity
        script: |
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"

      - *install_codemagic_cli

      - name: Verify Xcode 26.3
        script: scripts/select-xcode.sh

      - name: Download validated IPA for tagged commit
        script: |
          mkdir -p dist/flutter-ios
          builds_json="$RUNNER_TEMP/builds.json"
          curl --fail --silent --show-error \
            --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
            "https://api.codemagic.io/builds?appId=$CM_PROJECT_ID" \
            > "$builds_json"
          selection="$(
            python3 scripts/select-codemagic-ios-artifact.py \
              "$builds_json" "$CM_COMMIT"
          )"
          source_build_id="$(sed -n 's/^source_build_id=//p' <<< "$selection")"
          artifact_url="$(sed -n 's/^artifact_url=//p' <<< "$selection")"
          test -n "$source_build_id"
          test -n "$artifact_url"
          echo "Recovering signed IPA from validation build $source_build_id"
          curl --fail --silent --show-error --location \
            --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
            "$artifact_url" \
            -o dist/flutter-ios/Zuko-Flutter.ipa
          ipa_sha="$(shasum -a 256 dist/flutter-ios/Zuko-Flutter.ipa | awk '{print $1}')"
          printf '%s  %s\n' "$ipa_sha" Zuko-Flutter.ipa \
            > dist/flutter-ios/Zuko-Flutter.ipa.sha256

      - name: Revalidate tagged IPA
        script: |
          mkdir -p "$RUNNER_TEMP/recovered.xcarchive"
          scripts/apple-validate-package.sh \
            "$RUNNER_TEMP/recovered.xcarchive" \
            "$CM_BUILD_DIR/dist/flutter-ios/Zuko-Flutter.ipa" \
            "$ZUKO_VERSION" "$ZUKO_BUILD_NUMBER"

    artifacts:
      - dist/flutter-ios/Zuko-Flutter.ipa
      - dist/flutter-ios/Zuko-Flutter.ipa.sha256
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*
    publishing:
      app_store_connect:
        auth: integration
        # Upload for TestFlight processing. Beta-review submission remains a
        # deliberate App Store Connect operation.
        submit_to_testflight: false

  ios-testflight-artifact-recovery:
    name: iOS TestFlight artifact recovery
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: zuko-app-store
    environment:
      groups:
        - codemagic_api
      xcode: 26.3
      vars:
        CM_CLONE_UNSHALLOW: true
        TEAM_ID: R8PN382RC4
    scripts:
      - name: Verify recovery identity
        script: |
          [[ "${RECOVERY_TAG:-}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]
          [[ "${RECOVERY_BUILD_ID:-}" =~ ^[0-9a-f]{24}$ ]]
          [[ "${RECOVERY_IPA_SHA256:-}" =~ ^[0-9a-f]{64}$ ]]
          [[ "${RECOVERY_SOURCE_COMMIT:-}" =~ ^[0-9a-f]{40}$ ]]
          git fetch --force origin "refs/tags/$RECOVERY_TAG:refs/tags/$RECOVERY_TAG"
          test "$(git cat-file -t "$RECOVERY_TAG")" = tag
          test "$CM_COMMIT" = "$RECOVERY_SOURCE_COMMIT"
          git merge-base --is-ancestor \
            "$(git rev-parse "$RECOVERY_TAG^{commit}")" \
            "$RECOVERY_SOURCE_COMMIT"
          version="${RECOVERY_TAG#v}"
          IFS=. read -r major minor patch <<< "$version"
          release_build=$((1800000000 + major * 1000000 + minor * 1000 + patch))
          [[ "${RECOVERY_BUILD_NUMBER:-}" =~ ^[0-9]+$ ]]
          test "$RECOVERY_BUILD_NUMBER" -ge "$release_build"
          test "$RECOVERY_BUILD_NUMBER" -le 2100000000
          {
            echo "RECOVERY_COMMIT=$RECOVERY_SOURCE_COMMIT"
            echo "ZUKO_VERSION=$version"
            echo "ZUKO_BUILD_NUMBER=$RECOVERY_BUILD_NUMBER"
          } >> "$CM_ENV"

      - *install_codemagic_cli

      - name: Verify Xcode 26.3
        script: scripts/select-xcode.sh

      - name: Download verified Codemagic IPA
        script: |
          mkdir -p dist/flutter-ios
          build_json="$RUNNER_TEMP/source-build.json"
          curl --fail --silent --show-error \
            --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
            "https://api.codemagic.io/builds/$RECOVERY_BUILD_ID" \
            > "$build_json"
          selection="$(
            python3 scripts/select-codemagic-ios-artifact.py \
              "$build_json" "$RECOVERY_COMMIT"
          )"
          source_build_id="$(sed -n 's/^source_build_id=//p' <<< "$selection")"
          artifact_url="$(sed -n 's/^artifact_url=//p' <<< "$selection")"
          test "$source_build_id" = "$RECOVERY_BUILD_ID"
          test -n "$artifact_url"
          curl --fail --silent --show-error --location \
            --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
            "$artifact_url" \
            -o dist/flutter-ios/Zuko-Flutter.ipa
          actual_sha="$(shasum -a 256 dist/flutter-ios/Zuko-Flutter.ipa | awk '{print $1}')"
          test "$actual_sha" = "$RECOVERY_IPA_SHA256"
          printf '%s  %s\n' "$actual_sha" Zuko-Flutter.ipa \
            > dist/flutter-ios/Zuko-Flutter.ipa.sha256

      - name: Revalidate recovered IPA
        script: |
          mkdir -p "$RUNNER_TEMP/recovered.xcarchive"
          scripts/apple-validate-package.sh \
            "$RUNNER_TEMP/recovered.xcarchive" \
            "$CM_BUILD_DIR/dist/flutter-ios/Zuko-Flutter.ipa" \
            "$ZUKO_VERSION" "$ZUKO_BUILD_NUMBER"

    artifacts:
      - dist/flutter-ios/Zuko-Flutter.ipa
      - dist/flutter-ios/Zuko-Flutter.ipa.sha256
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false

  flutter-apple-ci:
    name: Flutter Apple compile gate
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      xcode: 26.3
      cocoapods: 1.16.2
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
    cache: *ios_cache
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: false
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - flutter/**
          - codemagic.yaml
          - Justfile
          - mise.toml
          - scripts/install-mise-codemagic.sh
          - scripts/package-apple-development.sh
          - scripts/patch-iroh-flutter.py
          - scripts/select-xcode.sh
    scripts:
      - *install_toolchain
      - *select_xcode

      - name: Build iOS Simulator and macOS clients
        script: $HOME/.local/bin/mise exec -- just build-apple-development

      - name: Package Apple development clients
        script: $HOME/.local/bin/mise exec -- just package-apple-development

    artifacts:
      - flutter/build/apple-artifacts/*.zip
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*

  mobile-appetize-release:
    name: Mobile Appetize previews
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - appetize_credentials
      android_signing:
        - zuko-android
      xcode: 26.3
      cocoapods: 1.16.2
      java: 17
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
    cache: *ios_cache
    scripts:
      - name: Verify immutable release identity
        script: |
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"

      - *install_toolchain
      - *select_xcode

      - name: Ensure pinned Android SDK components
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            'platform-tools' \
            'platforms;android-36' \
            'build-tools;36.0.0' \
            'ndk;28.2.13676358'
          test -x "$ANDROID_HOME/build-tools/36.0.0/apksigner"

      - name: Build signed Android release packages
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_KEYSTORE_PATH="$CM_KEYSTORE_PATH"
          export ANDROID_KEYSTORE_PASSWORD="$CM_KEYSTORE_PASSWORD"
          export ANDROID_KEY_ALIAS="$CM_KEY_ALIAS"
          export ANDROID_KEY_PASSWORD="$CM_KEY_PASSWORD"
          $HOME/.local/bin/mise exec -- just build-flutter-android
          $HOME/.local/bin/mise exec -- just package-android-release "$CM_TAG" signed

      - name: Build ARM iOS Simulator package
        script: |
          $HOME/.local/bin/mise exec -- just package-ios-preview "${CM_TAG#v}"

      - name: Upload signed Android APK to Appetize
        script: |
          test -n "${APPETIZE_API_TOKEN:-}"
          test -n "${APPETIZE_ANDROID_PUBLIC_KEY:-}"
          $HOME/.local/bin/mise exec -- just upload-appetize android \
            "dist/android/zuko-android-${CM_TAG}-signed.apk" \
            "$APPETIZE_ANDROID_PUBLIC_KEY" \
            "Zuko ${CM_TAG} from Codemagic"

      - name: Upload iOS Simulator package to Appetize
        script: |
          test -n "${APPETIZE_API_TOKEN:-}"
          test -n "${APPETIZE_IOS_PUBLIC_KEY:-}"
          $HOME/.local/bin/mise exec -- just upload-appetize ios \
            "dist/ios-preview/Zuko-Flutter-ios-simulator.zip" \
            "$APPETIZE_IOS_PUBLIC_KEY" \
            "Zuko ${CM_TAG} iOS Simulator from Codemagic"

    artifacts:
      - dist/android/*
      - dist/ios-preview/Zuko-Flutter-ios-simulator.zip
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*

  flutter-linux-ci:
    name: Flutter Linux, Android, and web compile gate
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
      java: 17
    cache: *ios_cache
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: false
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - flutter/**
          - flatpak/**
          - codemagic.yaml
          - Justfile
          - mise.toml
          - scripts/build-web.sh
          - scripts/check-dart-format.py
          - scripts/check-flutter-config.py
          - scripts/finalize-web-build.py
          - scripts/install-mise-codemagic.sh
          - scripts/patch-iroh-flutter.py
    scripts:
      - name: Install Linux desktop dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake libgtk-3-dev libsecret-1-dev ninja-build pkg-config

      - *install_toolchain

      - name: Ensure pinned Android SDK components
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            'platform-tools' \
            'platforms;android-36' \
            'build-tools;36.0.0' \
            'ndk;28.2.13676358'

      - name: Analyze, test, and build web
        script: |
          $HOME/.local/bin/mise exec -- just flutter-check
          $HOME/.local/bin/mise exec -- just build-web

      - name: Build Android and Linux clients
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          $HOME/.local/bin/mise exec -- just build-flutter-android-debug
          $HOME/.local/bin/mise exec -- just build-flutter-linux
          tar -czf flutter-linux-x86_64.tar.gz \
            -C flutter/build/linux/x64/release bundle

    artifacts:
      - flutter/build/app/outputs/flutter-apk/app-debug.apk
      - flutter-linux-x86_64.tar.gz

  flutter-linux-android-release:
    name: Flutter Linux and Android release artifacts
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      android_signing:
        - zuko-android
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
      java: 17
    cache: *ios_cache
    scripts:
      - name: Verify immutable release identity
        script: |
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"

      - *install_toolchain

      - name: Ensure pinned Android SDK components
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            'platform-tools' \
            'platforms;android-36' \
            'build-tools;36.0.0' \
            'ndk;28.2.13676358'

      - name: Build signed Android packages
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_KEYSTORE_PATH="$CM_KEYSTORE_PATH"
          export ANDROID_KEYSTORE_PASSWORD="$CM_KEYSTORE_PASSWORD"
          export ANDROID_KEY_ALIAS="$CM_KEY_ALIAS"
          export ANDROID_KEY_PASSWORD="$CM_KEY_PASSWORD"
          $HOME/.local/bin/mise exec -- just build-flutter-android
          $HOME/.local/bin/mise exec -- just package-android-release "$CM_TAG" signed

      - name: Build and smoke-test x86_64 Flatpak in pinned SDK
        script: |
          docker run --rm --privileged \
            --env CI=true \
            --env CM_COMMIT="$CM_COMMIT" \
            --env CM_TAG="$CM_TAG" \
            --env HOME=/home/builder \
            --env MISE_TRUSTED_CONFIG_PATHS=/workspace \
            --volume "$CM_BUILD_DIR:/workspace" \
            --volume "$HOME/.local:/home/builder/.local" \
            --volume "$HOME/.pub-cache:/home/builder/.pub-cache" \
            --workdir /workspace \
            ghcr.io/flathub-infra/flatpak-github-actions@sha256:bc5938197c339664f893828925061b08486e7f355c3e91eefcaae7293d3cfd6b \
            bash -lc '
              set -euo pipefail
              export PATH=/home/builder/.local/bin:$PATH
              git config --global --add safe.directory /workspace
              flutter_root="$(mise where http:flutter)"
              git config --global --add safe.directory "$flutter_root"
              mise exec -- just install-flatpak-llvm /opt/llvm
              export PATH=/opt/llvm/bin:$PATH
              dbus-uuidgen --ensure=/etc/machine-id
              mise exec -- just build-flutter-linux-release "$CM_COMMIT"
              mise exec -- just prepare-flatpak-release "$CM_TAG" "$CM_COMMIT"
              mise exec -- just package-flatpak-release "$CM_TAG" "$CM_COMMIT"
            '

      - name: Package Codemagic artifact handoff
        script: |
          mkdir -p dist/codemagic
          zip -j "dist/codemagic/zuko-flutter-linux-android-${CM_TAG}.zip" \
            dist/android/* \
            dist/linux/*

    artifacts:
      - dist/codemagic/zuko-flutter-linux-android-*.zip

  flutter-windows-ci:
    name: Flutter Windows compile gate
    instance_type: windows_x2
    max_build_duration: 90
    environment:
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: false
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - flutter/**
          - codemagic.yaml
          - Justfile
          - mise.toml
          - scripts/install-mise-codemagic.ps1
          - scripts/package-windows-release.ps1
          - scripts/patch-iroh-flutter.py
    scripts:
      - name: Install pinned repository toolchain
        script: pwsh -NoProfile -File scripts/install-mise-codemagic.ps1

      - name: Build Windows client
        script: |
          $mise = Join-Path $HOME ".local/bin/mise.exe"
          & $mise exec -- just build-flutter-windows-release v0.0.0

    artifacts:
      - dist/windows/*

  flutter-windows-release:
    name: Flutter Windows release artifacts
    instance_type: windows_x2
    max_build_duration: 90
    environment:
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
    scripts:
      - name: Verify immutable release identity
        script: |
          if ([string]::IsNullOrWhiteSpace($env:CM_TAG)) {
            throw "CM_TAG is required"
          }
          if ((git rev-parse HEAD) -ne $env:CM_COMMIT) {
            throw "checkout does not match CM_COMMIT"
          }
          bash scripts/release-context.sh $env:CM_TAG

      - name: Install pinned repository toolchain
        script: pwsh -NoProfile -File scripts/install-mise-codemagic.ps1

      - name: Build and package Windows client
        script: |
          $mise = Join-Path $HOME ".local/bin/mise.exe"
          & $mise exec -- just build-flutter-windows-release $env:CM_TAG
          New-Item -ItemType Directory -Force dist/codemagic | Out-Null
          Compress-Archive -Path dist/windows/* -DestinationPath "dist/codemagic/zuko-flutter-windows-$env:CM_TAG-artifacts.zip"

    artifacts:
      - dist/codemagic/zuko-flutter-windows-*-artifacts.zip
