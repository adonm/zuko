workflows:
  ios-signing-validation:
    name: iOS signing validation
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: zuko-app-store
    environment: &ios_environment
      xcode: 26.3
      cocoapods: 1.16.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dev.adonm.zuko
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
        TEAM_ID: R8PN382RC4
    cache: &ios_cache
      cache_paths:
        - $HOME/.cache/mise
        - $HOME/.local/share/mise
        - $HOME/.pub-cache
    scripts:
      - &install_toolchain
        name: Install pinned repository toolchain
        script: scripts/install-mise-codemagic.sh

      - &install_codemagic_cli
        name: Install pinned Codemagic CLI Tools
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          scripts/install-codemagic.sh
          "$RUNNER_TEMP/zuko-codemagic-cli/bin/codemagic-cli-tools" --version
          echo "RUNNER_TEMP=$RUNNER_TEMP" >> "$CM_ENV"

      - name: Resolve validation metadata
        script: $HOME/.local/bin/mise exec -- just build-context

      - &select_xcode
        name: Verify Xcode 26.3
        script: $HOME/.local/bin/mise exec -- just select-xcode

      - &flutter_check
        name: Analyze and test shared client
        script: $HOME/.local/bin/mise exec -- just flutter-check

      - &prepare_ghostty
        name: Prepare App Store-compatible Ghostty library
        script: $HOME/.local/bin/mise exec -- just prepare-ios-ghostty

      - &configure_signing
        name: Configure App Store signing
        script: |
          export RUNNER_TEMP="$CM_BUILD_DIR/.tmp/codemagic"
          mkdir -p "$RUNNER_TEMP"
          export APPLE_EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/flutter/ios/Runner.xcodeproj" \
            --archive-method app-store \
            --export-options-plist "$APPLE_EXPORT_OPTIONS" \
            --custom-export-options '{"destination":"export","manageAppVersionAndBuildNumber":false,"stripSwiftSymbols":true,"uploadSymbols":true}'
          plutil -lint "$APPLE_EXPORT_OPTIONS"
          {
            echo "RUNNER_TEMP=$RUNNER_TEMP"
            echo "APPLE_EXPORT_OPTIONS=$APPLE_EXPORT_OPTIONS"
          } >> "$CM_ENV"

      - &build_ipa
        name: Build signed Flutter IPA
        script: $HOME/.local/bin/mise exec -- just build-ios-store

      - &package_ipa
        name: Validate and package signed IPA
        script: $HOME/.local/bin/mise exec -- just package-ios-store

    artifacts: &ios_artifacts
      - dist/flutter-ios/Zuko-Flutter.ipa
      - dist/flutter-ios/Zuko-Flutter.ipa.sha256
      - flutter/build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*

  ios-testflight-release:
    name: iOS TestFlight release
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: zuko-app-store
    environment: *ios_environment
    cache: *ios_cache
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: false
    scripts:
      - name: Verify immutable release identity
        script: |
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"

      - *install_toolchain
      - *install_codemagic_cli

      - *select_xcode
      - *flutter_check
      - *prepare_ghostty
      - *configure_signing
      - *build_ipa
      - *package_ipa

    artifacts: *ios_artifacts
    publishing:
      app_store_connect:
        auth: integration
        # Upload for TestFlight processing. Beta-review submission remains a
        # deliberate App Store Connect operation.
        submit_to_testflight: false

  flutter-apple-ci:
    name: Flutter Apple compile gate
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      xcode: 26.3
      cocoapods: 1.16.2
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
    cache: *ios_cache
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: false
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - flutter/**
          - codemagic.yaml
          - Justfile
          - mise.toml
          - scripts/install-mise-codemagic.sh
          - scripts/package-apple-development.sh
          - scripts/patch-iroh-flutter.py
          - scripts/select-xcode.sh
    scripts:
      - *install_toolchain
      - *select_xcode

      - name: Build iOS Simulator and macOS clients
        script: $HOME/.local/bin/mise exec -- just build-apple-development

      - name: Package Apple development clients
        script: $HOME/.local/bin/mise exec -- just package-apple-development

    artifacts:
      - flutter/build/apple-artifacts/*.zip
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*

  mobile-appetize-release:
    name: Mobile Appetize previews
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - appetize_credentials
      android_signing:
        - zuko-android
      xcode: 26.3
      cocoapods: 1.16.2
      java: 17
      vars:
        CM_CLONE_UNSHALLOW: true
        CM_RECURSIVE_SUBMODULE_INIT: true
        MISE_LOG_LEVEL: info
        MISE_TRUSTED_CONFIG_PATHS: $CM_BUILD_DIR
        MISE_YES: 1
    cache: *ios_cache
    scripts:
      - name: Verify immutable release identity
        script: |
          test -n "${CM_TAG:-}"
          test "$(git rev-parse HEAD)" = "$CM_COMMIT"
          scripts/release-context.sh "$CM_TAG"

      - *install_toolchain
      - *select_xcode

      - name: Ensure pinned Android SDK components
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            'platform-tools' \
            'platforms;android-36' \
            'build-tools;36.0.0' \
            'ndk;28.2.13676358'
          test -x "$ANDROID_HOME/build-tools/36.0.0/apksigner"

      - name: Build signed Android release packages
        script: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_KEYSTORE_PATH="$CM_KEYSTORE_PATH"
          export ANDROID_KEYSTORE_PASSWORD="$CM_KEYSTORE_PASSWORD"
          export ANDROID_KEY_ALIAS="$CM_KEY_ALIAS"
          export ANDROID_KEY_PASSWORD="$CM_KEY_PASSWORD"
          $HOME/.local/bin/mise exec -- just build-flutter-android
          $HOME/.local/bin/mise exec -- just package-android-release "$CM_TAG" signed

      - name: Build ARM iOS Simulator package
        script: |
          $HOME/.local/bin/mise exec -- just package-ios-preview "${CM_TAG#v}"

      - name: Upload signed Android APK to Appetize
        script: |
          test -n "${APPETIZE_API_TOKEN:-}"
          test -n "${APPETIZE_ANDROID_PUBLIC_KEY:-}"
          $HOME/.local/bin/mise exec -- just upload-appetize android \
            "dist/android/zuko-android-${CM_TAG}-signed.apk" \
            "$APPETIZE_ANDROID_PUBLIC_KEY" \
            "Zuko ${CM_TAG} from Codemagic"

      - name: Upload iOS Simulator package to Appetize
        script: |
          test -n "${APPETIZE_API_TOKEN:-}"
          test -n "${APPETIZE_IOS_PUBLIC_KEY:-}"
          $HOME/.local/bin/mise exec -- just upload-appetize ios \
            "dist/ios-preview/Zuko-Flutter-ios-simulator.zip" \
            "$APPETIZE_IOS_PUBLIC_KEY" \
            "Zuko ${CM_TAG} iOS Simulator from Codemagic"

    artifacts:
      - dist/android/*
      - dist/ios-preview/Zuko-Flutter-ios-simulator.zip
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/DiagnosticReports/*
