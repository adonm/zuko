# xtool project config. Single source of truth for bundle identity and the
# custom Info.plist that lives alongside the Swift sources. The full schema
# is in `PackLib/PackSchema.swift` — only the fields we actually need here.
#
# - `version: 1` is the only supported schema version (xtool 1.x).
# - `bundleID` (instead of `orgID + product`) pins the bundle id outright so
#   we don't depend on the library product name for identity. Matches the
#   `dev.adonm.zuko` we ship in the legacy `project.yml`.
# - `product: Zuko` is redundant right now (only one library product in
#   `Package.swift`) but explicit is better than implicit — if we ever add a
#   second product (e.g. an app extension), xtool picks this one as the app.
# - `infoPath` points at the same hand-maintained Info.plist the xcodebuild
#   path uses. xtool's Planner merges it ON TOP of its defaults
#   (`uniquingKeysWith: { $1 }` — user wins on conflicts), so we override
#   exactly the keys we care about (orientation, display name,
#   NSLocalNetworkUsageDescription, etc.) and inherit xtool's sensible
#   defaults for the rest (UIDeviceFamily, UILaunchScreen, etc.).
#
# Run from `ios/`: `xtool dev build --ipa`. The version on the resulting
# `.ipa`'s CFBundleShortVersionString is patched into Info.plist by
# `scripts/patch-ios-plist.sh` before the build (xtool has no xcargs
# equivalent).
version: 1
bundleID: dev.adonm.zuko
product: Zuko
infoPath: Zuko/Zuko/Info.plist
