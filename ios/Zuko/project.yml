name: Zuko
options:
  bundleIdPrefix: dev.adonm
  deploymentTarget:
    iOS: "26.5"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: NO
    # Network.framework is needed on iOS by iroh's netdev (nw_interface_get_index
    # and friends). iroh-ffi's own Package.swift also links Network +
    # SystemConfiguration via `.linkedFramework`, but the legacy XcodeGen path
    # doesn't see SwiftPM linkerSettings, so we set the flag here explicitly.
    # CoreWLAN (mentioned in iroh-ffi's README) is macOS-only — iOS apps don't
    # link it (and iroh-ffi correctly gates it `.when(platforms: [.macOS])`).
    OTHER_LDFLAGS: $(inherited) -framework Network

packages:
  libghostty-spm:
    url: https://github.com/Lakr233/libghostty-spm.git
    from: "1.2.9"
  iroh-ffi:
    url: https://github.com/n0-computer/iroh-ffi.git
    from: "1.0.0"
  # The Rust FFI (Argon2id key derivation for the claim flow). Local package
  # that wraps `Zuko.xcframework` (built by `scripts/build-ffi.sh` or the
  # build-ios CI step) + the uniffi-generated Swift bindings.
  ZukoFFI:
    path: ../ZukoFFI
  # Wire protocol package (framing shared with `zuko host`), unit-tested on
  # Linux/CI like the Rust `src/wire.rs`. See ../ZukoWire/Package.swift.
  ZukoWire:
    path: ../ZukoWire

targets:
  Zuko:
    type: application
    platform: iOS
    deploymentTarget: "26.5"
    sources:
      - path: Zuko
    info:
      path: Zuko/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.adonm.zuko
        PRODUCT_NAME: Zuko
        # Local-dev fallback. CI overrides both via xcargs (see
        # fastlane/Fastfile + .github/workflows/*-ios.yml): MARKETING_VERSION
        # always comes from Cargo.toml via scripts/version.sh, and
        # CURRENT_PROJECT_VERSION comes from a per-build monotonic value
        # (Unix seconds via `date -u +%s`) so App Store Connect sees a
        # strictly-increasing build number on every upload. Bump these
        # defaults when you cut a release so a fresh `mise run build-ios`
        # matches the binary version.
        MARKETING_VERSION: "0.9.0"
        CURRENT_PROJECT_VERSION: "1"
        # Universal iPhone + iPad app. App Store Connect validates the base
        # UISupportedInterfaceOrientations key for iPad multitasking, so both
        # the base and iPad-specific keys list all four orientations. Keep this
        # in sync with xtool's default UIDeviceFamily ([1, 2]) for local/CI builds.
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        # See the base-settings note above — Network.framework is also linked
        # there. Redundant with iroh-ffi's SwiftPM linkerSettings but the
        # XcodeGen path doesn't see those.
        OTHER_LDFLAGS: $(inherited) -framework Network
        # Xcode 26 defaults GENERATE_INFOPLIST_FILE to YES. Our hand-maintained
        # Info.plist (Zuko/Info.plist) is used as the base, and INFOPLIST_KEY_*
        # build settings are merged on top. The orientation keys are set here
        # (not just in the Info.plist file) because the merge was unreliable —
        # ASC validation kept reporting "No orientations were specified" even
        # though the Info.plist file had them. Setting via build settings is the
        # modern Xcode approach and guarantees the keys land in the built plist.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations__iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Zuko
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Zuko connects to your own hosts over the local network when they're nearby. No data leaves your devices except the terminal session to your host."
        INFOPLIST_KEY_NSCameraUsageDescription: "Zuko uses the camera only to scan a one-time pairing code shown by your host."
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Export compliance: only standard exempt crypto (iroh QUIC/TLS +
        # Argon2id). Stops App Store Connect prompting for encryption docs on
        # every upload. Mirrors ITSAppUsesNonExemptEncryption in Info.plist.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: libghostty-spm
        product: GhosttyTerminal
      - package: libghostty-spm
        product: GhosttyKit
      - package: libghostty-spm
        product: GhosttyTheme
      - package: iroh-ffi
        product: IrohLib
      - package: ZukoFFI
      - package: ZukoWire
    postBuildScripts:
      - name: Patch framework MinimumOSVersion
        # iroh-ffi's binary XCFramework ships without MinimumOSVersion in its
        # Info.plist, which fails App Store validation ("Invalid MinimumOSVersion
        # ... MinimumOSVersion in 'Iroh.framework' is ''"). Patch any embedded
        # framework that's missing it. Idempotent — only adds the key if absent.
        script: |
          for fw in "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"/*.framework; do
              [ -d "$fw" ] || continue
              plist="$fw/Info.plist"
              [ -f "$plist" ] || continue
              min_os=$(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$plist" 2>/dev/null || echo "")
              if [ -z "$min_os" ]; then
                  /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${IPHONEOS_DEPLOYMENT_TARGET}" "$plist"
              fi
          done
