name: Zuko
options:
  bundleIdPrefix: dev.adonm
  deploymentTarget:
    iOS: "17.5"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: NO
    # IrohLib's Rust core needs Network.framework on iOS (nw_interface_get_index).
    OTHER_LDFLAGS: $(inherited) -framework Network

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.12.0"
  iroh-ffi:
    url: https://github.com/n0-computer/iroh-ffi.git
    from: "1.0.0"
  # The Rust FFI (Argon2id key derivation for the claim flow). Local package
  # that wraps `Zuko.xcframework` (built by `scripts/build-ffi.sh` or the
  # build-ios CI step) + the uniffi-generated Swift bindings.
  ZukoFFI:
    path: ../ZukoFFI

targets:
  Zuko:
    type: application
    platform: iOS
    deploymentTarget: "17.5"
    sources:
      - path: Zuko
    info:
      path: Zuko/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.adonm.zuko
        PRODUCT_NAME: Zuko
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        OTHER_LDFLAGS: $(inherited) -framework Network
    dependencies:
      - package: SwiftTerm
      - package: iroh-ffi
        product: IrohLib
      - package: ZukoFFI
