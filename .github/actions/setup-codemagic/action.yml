name: Set up pinned Codemagic CLI Tools
description: Install pinned Python and the hash-locked Codemagic CLI closure

inputs:
  working-directory:
    description: Repository checkout containing the scripts directory
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Set up Python 3.13.14
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
      with:
        python-version: 3.13.14
        cache: pip
        cache-dependency-path: ${{ inputs.working-directory }}/scripts/codemagic-requirements.txt

    - name: Install pinned Codemagic CLI Tools
      shell: bash
      run: |
        cd "${{ inputs.working-directory }}"
        bash scripts/install-codemagic.sh
