name: Cache Rust build state
description: Restore Cargo dependencies and target outputs for one job partition

inputs:
  partition:
    description: Stable target or job partition
    required: true

runs:
  using: composite
  steps:
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: zuko-rust-${{ runner.os }}-${{ inputs.partition }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          zuko-rust-${{ runner.os }}-${{ inputs.partition }}-
