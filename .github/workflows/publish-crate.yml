name: publish crate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish (vX.Y.Z)'
        required: true

permissions:
  contents: read

concurrency:
  group: publish-crate-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify zuko package
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.identity.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve crate version and source
        id: identity
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: scripts/release-context.sh "$TAG"

      - name: Install pinned Rust toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust

      - name: Verify packaged crate and dependency fix
        run: scripts/check-crate-package.sh

  publish:
    name: publish zuko
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.sha }}

      - name: Install pinned Rust toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust

      - name: Check registry version status
        id: version
        run: |
          set -euo pipefail
          version=$(scripts/version.sh)
          status=$(curl --silent --show-error \
            --user-agent zuko-trusted-publisher \
            --output /dev/null \
            --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/zuko/$version")
          case "$status" in
            200) echo "published=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "published=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected crates.io response: HTTP $status" >&2; exit 1 ;;
          esac

      - name: Authenticate to crates.io with trusted publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crate version once
        if: steps.version.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish --locked
