name: publish crate

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: publish-crate-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify zuko package
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.identity.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pinned repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Resolve crate version and source
        id: identity
        env:
          TAG: ${{ github.ref_name }}
        run: mise exec -- just release-context "$TAG"

      - name: Verify packaged crate and dependency fix
        run: mise exec -- just check-crate-package

  publish:
    name: publish zuko
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.sha }}

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Check registry version status
        id: version
        run: mise exec -- just crate-publish-status

      - name: Authenticate to crates.io with trusted publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crate version once
        if: steps.version.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: mise exec -- just publish-crate
