name: publish crate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable release tag to publish (vX.Y.Z)
        required: true
        type: string
      sha:
        description: Exact release commit
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-crate-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: verify and publish zuko
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: crates-io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Install pinned repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust just

      - uses: ./.github/actions/cache-rust
        with:
          partition: publish-crate

      - name: Resolve release source
        env:
          EXPECTED_SHA: ${{ inputs.sha }}
          TAG: ${{ inputs.tag }}
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          mise exec -- just release-context "$TAG"

      - name: Verify packaged crate and dependency fix
        run: mise exec -- just check-crate-package

      - name: Check registry version status
        id: version
        run: mise exec -- just crate-publish-status

      - name: Authenticate to crates.io with trusted publishing
        if: steps.version.outputs.published != 'true'
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crate version once
        if: steps.version.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: mise exec -- just publish-crate
