name: release-flutter-macos

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Immutable release tag to build (vX.Y.Z)"
        required: true
        type: string
      lane:
        description: "Build a signed Mac App Store package or upload it"
        type: choice
        default: build
        options:
          - build
          - upload

permissions:
  contents: read

concurrency:
  group: mac-app-store-dev-adonm-zuko
  cancel-in-progress: false

jobs:
  build:
    name: signed Flutter macOS package
    runs-on: macos-latest
    timeout-minutes: 120
    environment: apple-store
    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Resolve release metadata
        env:
          TAG: ${{ inputs.tag }}
        run: mise exec -- just release-context "$TAG"

      - name: Select Xcode 26.3
        run: mise exec -- just select-xcode

      - uses: ./.github/actions/setup-codemagic

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-${{ runner.arch }}-flutter-macos-store-${{ hashFiles('flutter/pubspec.lock') }}


      - name: Resolve, analyze, and test shared client
        run: mise exec -- just flutter-check

      - name: Configure Mac App Store signing with Codemagic
        env:
          MACOS_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: mise exec -- just configure-apple-signing macos

      - name: Build signed Flutter macOS application
        run: mise exec -- just build-macos-store

      - name: Create and validate Mac App Store package
        run: mise exec -- just package-macos-store

      - name: Upload signed Mac App Store package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-macos-${{ env.ZUKO_VERSION }}-${{ env.ZUKO_BUILD_NUMBER }}
          path: |
            dist/flutter-macos/Zuko-Flutter.pkg
            dist/flutter-macos/Zuko-Flutter.pkg.sha256
          if-no-files-found: error
          retention-days: 7

  upload:
    name: upload to Mac App Store Connect
    if: ${{ inputs.lane == 'upload' }}
    needs: build
    runs-on: macos-latest
    timeout-minutes: 30
    environment: apple-store
    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Select Xcode 26.3
        run: mise exec -- just select-xcode

      - uses: ./.github/actions/setup-codemagic

      - name: Download signed package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: zuko-flutter-macos-*
          path: dist/flutter-macos
          merge-multiple: true

      - name: Revalidate package and upload with Codemagic
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: mise exec -- just upload-macos-store
