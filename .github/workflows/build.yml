name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true


      - name: Clippy + tests
        run: mise exec -- just test

      - name: End-to-end (connect, pairing, revocation)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # Runs the #[ignore] e2e integration test in tests/e2e.rs: spawns
        # `zuko host`, drives `zuko connect` under a PTY, exercises
        # `zuko share`/`zuko claim`, then proves a revoked client gets one fatal
        # authorization error rather than a reconnect loop. Needs access to
        # Iroh's public relays.
        run: mise exec -- just test-e2e

      - name: Lint markdown links
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # lychee checks every link in all repo markdown (config in
        # .lychee.toml). GITHUB_TOKEN lifts GitHub rate limits so CI is
        # stable. Runs only on the ubuntu leg to avoid duplicating on macos.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise exec -- just lint-md

      - name: Lint GitHub Actions workflows
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # actionlint validates workflow syntax, action versions/SHAs,
        # permissions, expression contexts. Ubuntu leg only.
        run: mise exec -- just lint-ci
