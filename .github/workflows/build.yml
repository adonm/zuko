name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: mise install
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Ensure clippy/rustfmt (reliable across cached toolchains)
        run: rustup component add clippy rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Clippy + tests
        run: mise run test

      - name: Build (release)
        run: mise run build

      - name: End-to-end (host<->connect, share<->claim)
        # Runs the #[ignore] e2e integration test in tests/e2e.rs: spawns
        # `zuko host`, drives `zuko connect` under a PTY, and exercises
        # `zuko share`/`zuko claim` against the real Iroh network (needs
        # network access to Iroh's public relays). The Rust harness replaces
        # the former Python script — same coverage, plus a regression guard
        # that `share` exits on its own after a claim.
        run: mise run test-e2e

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-${{ runner.os }}
          path: target/release/zuko
          if-no-files-found: error
