name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MISE_AUTO_INSTALL: "0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust just lychee actionlint

      - name: Clippy + tests
        run: mise exec -- just test

      - name: End-to-end (connect, pairing, revocation)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: mise exec -- just test-e2e

      - name: Lint markdown links
        if: ${{ matrix.os == 'ubuntu-latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise exec -- just lint-md

      - name: Lint GitHub Actions workflows
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: mise exec -- just lint-ci

  cli:
    name: CLI candidate ${{ matrix.target }}
    if: ${{ github.event_name != 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu, cross: false }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true }
          - { runner: macos-latest, target: x86_64-apple-darwin, cross: false }
          - { runner: macos-latest, target: aarch64-apple-darwin, cross: false }
    runs-on: ${{ matrix.runner }}
    env:
      ZUKO_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust just

      - name: Install cross toolchain
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Select Xcode 26.3
        if: ${{ endsWith(matrix.target, '-apple-darwin') }}
        run: mise exec -- just select-xcode

      - name: Build and package CLI candidate
        run: |
          mise exec -- just build-cli-release "$ZUKO_TARGET"
          if test "$ZUKO_TARGET" = x86_64-unknown-linux-gnu; then
            mise exec -- just bundle-cage
          fi
          mise exec -- just package-cli-release "$ZUKO_TARGET"

      - name: Upload CLI candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-candidate-cli-${{ matrix.target }}-${{ github.sha }}
          path: |
            zuko-${{ matrix.target }}.tar.gz
            zuko-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  flutter-linux:
    name: Flutter Linux GTK4 candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux build and smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cage clang cmake libegl-dev libgl-dev libgtk-4-dev \
            libsecret-1-dev mesa-vulkan-drivers ninja-build pkg-config

      - name: Install pinned tools and Flutter SDK
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust zig just http:flutter

      - name: Analyze and test shared Flutter client
        run: mise exec -- just flutter-ci-check

      - name: Build GTK4 release bundle
        run: |
          for attempt in 1 2; do
            if mise exec -- just build-flutter-linux; then break; fi
            if test "$attempt" -eq 2; then exit 1; fi
            echo 'Native-assets build failed; retrying once with its populated cache' >&2
          done

      - name: Package deterministic GTK4 archive
        env:
          SHA: ${{ github.sha }}
        run: |
          tag="v$(scripts/version.sh)"
          SOURCE_DATE_EPOCH=$(git show -s --format=%ct "$SHA") \
            mise exec -- just package-linux-release "$tag" "$SHA"
          archive="dist/linux/zuko-linux-$tag-x86_64.tar.gz"
          cp "$archive" "$RUNNER_TEMP/$(basename "$archive")"
          SOURCE_DATE_EPOCH=$(git show -s --format=%ct "$SHA") \
            mise exec -- just package-linux-release "$tag" "$SHA"
          cmp "$RUNNER_TEMP/$(basename "$archive")" "$archive"

      - name: Smoke extracted archive with Impeller
        run: |
          install -d -m 700 .tmp/gtk4-wayland
          set +e
          XDG_RUNTIME_DIR="$GITHUB_WORKSPACE/.tmp/gtk4-wayland" \
          GDK_BACKEND=wayland GDK_DISABLE=gl,vulkan GSK_RENDERER=cairo \
          WLR_BACKENDS=headless WLR_LIBINPUT_NO_DEVICES=1 \
          WLR_RENDERER=pixman LIBGL_ALWAYS_SOFTWARE=1 \
          timeout 15s cage -- build/linux-release/extracted/bundle/zuko \
            > gtk4-release-smoke.log 2>&1
          status=$?
          set -e
          cat gtk4-release-smoke.log
          test "$status" -eq 124
          grep -Eq 'Using the Impeller rendering backend \((Vulkan|OpenGLES|VulkanSDF|OpenGLESSDF)\)\.' \
            gtk4-release-smoke.log

      - name: Upload Linux candidate
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-candidate-flutter-linux-${{ github.sha }}
          path: dist/linux/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  flutter-android-web:
    name: Flutter Android and web candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platforms;android-34
            platforms;android-35
            platforms;android-36
            build-tools;36.0.0
            cmake;3.22.1
            ndk;29.0.14206865

      - name: Install pinned tools and Flutter SDK
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust zig just http:flutter

      - name: Install pinned Android platform tools
        run: scripts/install-android-platform-tools.sh "$ANDROID_SDK_ROOT"

      - name: Build web and unsigned Android release packages
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          mise exec -- just build-web
          mise exec -- just build-flutter-android
          mise exec -- just package-android-unsigned "v$(scripts/version.sh)"

      - name: Upload Android candidate
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-candidate-flutter-android-${{ github.sha }}
          path: dist/android/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  flutter-windows:
    name: Flutter Windows candidate
    runs-on: windows-2025
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable long paths
        run: git config --global core.longpaths true

      - name: Install pinned tools and Flutter SDK
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust zig just http:flutter

      - name: Build and package Windows candidate
        shell: pwsh
        run: |
          $version = (& bash scripts/version.sh).Trim()
          $tag = "v$version"
          mise exec -- just --shell pwsh --shell-arg=-NoProfile --shell-arg=-Command build-flutter-windows-release $tag

      - name: Upload Windows candidate
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-candidate-flutter-windows-${{ github.sha }}
          path: dist/windows/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  flutter-apple:
    name: Flutter Apple candidate
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned tools and Flutter SDK
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust zig just http:flutter

      - name: Select Xcode 26.3
        run: mise exec -- just select-xcode

      - name: Build and package Apple development clients
        run: |
          mise exec -- just build-apple-development
          mise exec -- just package-apple-development

      - name: Upload Apple candidate
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-candidate-flutter-apple-${{ github.sha }}
          path: flutter/build/apple-artifacts/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  candidate:
    name: Assemble build-once release candidate
    if: ${{ github.event_name != 'pull_request' }}
    needs: [test, cli, flutter-linux, flutter-android-web, flutter-windows, flutter-apple]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download candidate components
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: zuko-candidate-*-${{ github.sha }}
          path: candidate
          merge-multiple: true

      - name: Create exact-byte candidate manifest
        run: python3 scripts/release_candidate.py create "$GITHUB_SHA" candidate

      - name: Upload complete release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-release-candidate-${{ github.sha }}
          path: candidate/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
