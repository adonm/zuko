name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: mise install
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Ensure clippy/rustfmt (reliable across cached toolchains)
        run: rustup component add clippy rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy + tests
        run: mise run test

      - name: Build (release)
        run: mise run build

      - name: End-to-end (host<->connect, share<->claim)
        # Runs the #[ignore] e2e integration test in tests/e2e.rs: spawns
        # `zuko host`, drives `zuko connect` under a PTY, and exercises
        # `zuko share`/`zuko claim` against the real Iroh network (needs
        # network access to Iroh's public relays). The Rust harness replaces
        # the former Python script — same coverage, plus a regression guard
        # that `share` exits on its own after a claim.
        run: mise run test-e2e

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: zuko-${{ runner.os }}
          path: target/release/zuko
          if-no-files-found: error
