name: android

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-android.yml'
      - 'android/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'build.rs'
      - 'mise.toml'
      - 'scripts/build-android-native.sh'
      - 'scripts/patch-android-uniffi.py'
      - 'scripts/version.sh'
      - 'src/code.rs'
      - 'src/ffi.rs'
      - 'src/lib.rs'
      - 'uniffi-bindgen.rs'
      - 'uniffi.toml'
  pull_request:
    paths:
      - '.github/workflows/build-android.yml'
      - 'android/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'build.rs'
      - 'mise.toml'
      - 'scripts/build-android-native.sh'
      - 'scripts/patch-android-uniffi.py'
      - 'scripts/version.sh'
      - 'src/code.rs'
      - 'src/ffi.rs'
      - 'src/lib.rs'
      - 'uniffi-bindgen.rs'
      - 'uniffi.toml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test Android
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: android-r29

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            cmake;3.22.1

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        with:
          ndk-version: r29
          link-to-sdk: true

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build, lint, and unit test
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: mise run android-ci

      - name: Enable KVM for the Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Native terminal instrumentation smoke test
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 36
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          script: mise exec java@temurin-21 -- ./android/gradlew -p android :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload Android packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-android-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/reports/**
          if-no-files-found: error
