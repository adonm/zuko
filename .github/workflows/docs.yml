name: docs

# Builds the mdBook site from `docs/` (config in `book.toml`) and publishes
# it to GitHub Pages. Mise installs pinned tools and Just runs the same recipes
# used locally.
#
# Pages must be configured in the repo settings: Settings → Pages →
# "Build and deployment" → Source = "GitHub Actions" (not "Deploy from a
# branch"). This workflow supplies the artifact.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "book.toml"
      - "Justfile"
      - "mise.toml"
      - "scripts/build-web.sh"
      - "scripts/finalize-web-build.py"
      - "scripts/prepare-web-plugins.py"
      - "flutter/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel in-flight runs (Pages
# deploy can leave the environment half-published if interrupted mid-deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build mdbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - uses: ./.github/actions/cache-flutter

      - name: Lint markdown links
        # Gate the deploy on link health (config in .lychee.toml). GITHUB_TOKEN
        # lifts GitHub rate limits.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise exec -- just lint-md

      - name: Test curl installer
        run: mise exec -- just test-installer

      - name: Install site build system deps
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build site
        run: mise exec -- just build-docs

      - name: Verify installer is published
        run: test -f target/book/install.sh

      - name: Build web client
        run: mise exec -- just build-web

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          # mdbook build.dir (book.toml [build] build-dir) = target/book
          path: target/book

  deploy:
    name: deploy to pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
