name: docs

# Builds the mdBook site from `docs/` (config in `book.toml`) and publishes
# it to GitHub Pages. Mise installs pinned tools and Just runs the same recipes
# used locally.
#
# Pages must be configured in the repo settings: Settings → Pages →
# "Build and deployment" → Source = "GitHub Actions" (not "Deploy from a
# branch"). This workflow supplies the artifact.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "flatpak/**"
      - "book.toml"
      - "Justfile"
      - "mise.toml"
      - "scripts/build-web.sh"
      - "scripts/finalize-web-build.py"
      - "scripts/build-flatpak-repository.sh"
      - "flutter/**"
      - ".github/workflows/docs.yml"
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel in-flight runs (Pages
# deploy can leave the environment half-published if interrupted mid-deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build mdbook
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          submodules: recursive

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true


      - name: Lint markdown links
        # Gate the deploy on link health (config in .lychee.toml). GITHUB_TOKEN
        # lifts GitHub rate limits.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise exec -- just lint-md

      - name: Test curl installer
        run: mise exec -- just test-installer

      - name: Install site build system deps
        run: sudo apt-get update && sudo apt-get install -y clang flatpak

      - name: Build site
        run: mise exec -- just build-docs

      - name: Verify installer is published
        run: test -f target/book/install.sh

      - name: Build web client
        run: mise exec -- just build-web

      - name: Build signed Flatpak testing repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLATPAK_GPG_PRIVATE_KEY_BASE64: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY_BASE64 }}
        run: |
          tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)"
          asset="zuko-linux-${tag}-x86_64.flatpak"
          mkdir -p .tmp/site-flatpak target/book/flatpak
          gh release download "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --pattern "$asset.sha256" \
            --dir .tmp/site-flatpak
          (cd .tmp/site-flatpak && sha256sum --check "$asset.sha256")
          scripts/build-flatpak-repository.sh \
            ".tmp/site-flatpak/$asset" target/book/flatpak/repo
          install -m 0644 flatpak/zuko.flatpakrepo target/book/flatpak/
          install -m 0644 flatpak/zuko.flatpakref target/book/flatpak/
          test -s target/book/flatpak/repo/summary.sig

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.0
        with:
          # mdbook build.dir (book.toml [build] build-dir) = target/book
          path: target/book

  deploy:
    name: deploy to pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.0
