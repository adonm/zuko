name: flutter

on:
  push:
    branches: [main]
    paths:
      - 'flutter/**'
      - 'Justfile'
      - 'mise.toml'
      - 'scripts/build-web.sh'
      - 'scripts/build-flutter-linux-release.sh'
      - 'scripts/check-dart-format.py'
      - 'scripts/check-flutter-config.py'
      - 'scripts/finalize-web-build.py'
      - 'scripts/install-flatpak-llvm.sh'
      - 'scripts/install-flatpak-sysroot.sh'
      - 'scripts/package-flatpak.sh'
      - 'scripts/patch-flutter-linux-cross.py'
      - 'scripts/patch-iroh-flutter.py'
      - 'scripts/prepare-flatpak-release.py'
      - 'scripts/validate-flatpak.sh'
      - 'flatpak/**'
      - '.github/workflows/build-flutter.yml'
  pull_request:
    paths:
      - 'flutter/**'
      - 'Justfile'
      - 'mise.toml'
      - 'scripts/build-web.sh'
      - 'scripts/build-flutter-linux-release.sh'
      - 'scripts/check-dart-format.py'
      - 'scripts/check-flutter-config.py'
      - 'scripts/finalize-web-build.py'
      - 'scripts/install-flatpak-llvm.sh'
      - 'scripts/install-flatpak-sysroot.sh'
      - 'scripts/package-flatpak.sh'
      - 'scripts/patch-flutter-linux-cross.py'
      - 'scripts/patch-iroh-flutter.py'
      - 'scripts/prepare-flatpak-release.py'
      - 'scripts/validate-flatpak.sh'
      - 'flatpak/**'
      - '.github/workflows/build-flutter.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    name: Dart tests and web build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: flutter/packages/flterm/.tmp/flterm-0.0.4.tar.gz
          key: flterm-test-assets-0.0.4-d903c7c768f067bcd
      - name: Install web compiler dependencies
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Analyze and test shared client
        run: mise exec -- just flutter-check
      - name: Build relay-only Flutter web client
        run: mise exec -- just build-web

  android:
    name: Android debug package
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;28.2.13676358
      - name: Build APK
        run: mise exec -- just build-flutter-android-debug
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-android-${{ github.sha }}
          path: flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  linux:
    name: Linux desktop bundle (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Install Linux desktop dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          clang cmake libgtk-3-dev libsecret-1-dev ninja-build pkg-config
      - name: Build Linux client
        run: mise exec -- just build-flutter-linux
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-linux-x86_64-${{ github.sha }}
          path: flutter/build/linux/x64/release/bundle/**
          if-no-files-found: error

  linux-arm64:
    name: Linux desktop bundle (aarch64 cross-build)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Install cross compiler and pinned ARM64 sysroot
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake flatpak lld llvm ninja-build pkg-config
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo scripts/install-flatpak-sysroot.sh \
            aarch64 /opt/aarch64-sysroot
      - name: Cross-build Linux ARM64 client
        run: >-
          mise exec -- just build-flutter-linux-release "$GITHUB_SHA"
          linux-arm64 /opt/aarch64-sysroot
      - name: Preserve ARM64 bundle metadata
        run: >-
          tar -czf flutter-linux-aarch64.tar.gz
          -C flutter/build/linux/arm64/release bundle
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-linux-aarch64-${{ github.sha }}
          path: flutter-linux-aarch64.tar.gz
          if-no-files-found: error

  linux-arm64-flatpak:
    name: Linux Flatpak package (aarch64)
    needs: linux-arm64
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions@sha256:bc5938197c339664f893828925061b08486e7f355c3e91eefcaae7293d3cfd6b
      options: --privileged
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Trust container checkout ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-flutter-linux-aarch64-${{ github.sha }}
      - name: Restore ARM64 Flutter bundle
        run: |
          mkdir -p flutter/build/linux/arm64/release
          tar -xzf flutter-linux-aarch64.tar.gz \
            -C flutter/build/linux/arm64/release
      - name: Package and smoke-test Flatpak offline
        run: |
          dbus-uuidgen --ensure=/etc/machine-id
          python3 scripts/prepare-flatpak-release.py \
            "v$(scripts/version.sh)" "$GITHUB_SHA"
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          export SOURCE_DATE_EPOCH
          dbus-run-session -- bash scripts/package-flatpak.sh \
            "v$(scripts/version.sh)"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-linux-aarch64-flatpak-${{ github.sha }}
          path: |
            dist/linux/*.flatpak
            dist/linux/*.flatpak.sha256
          if-no-files-found: error

  windows:
    name: Windows desktop bundle
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Build and package Windows client
        run: mise exec -- just build-flutter-windows-release v0.0.0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          name: zuko-flutter-windows-${{ github.sha }}
          path: flutter/build/windows/x64/runner/Release/**
          if-no-files-found: error
          retention-days: 7
