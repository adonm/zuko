name: flutter

on:
  push:
    branches: [main]
    paths:
      - 'flutter/**'
      - 'Justfile'
      - 'mise.toml'
      - 'scripts/build-web.sh'
      - 'scripts/check-dart-format.py'
      - 'scripts/check-flutter-config.py'
      - 'scripts/finalize-web-build.py'
      - 'scripts/patch-iroh-flutter.py'
      - '.github/workflows/build-flutter.yml'
  pull_request:
    paths:
      - 'flutter/**'
      - 'Justfile'
      - 'mise.toml'
      - 'scripts/build-web.sh'
      - 'scripts/check-dart-format.py'
      - 'scripts/check-flutter-config.py'
      - 'scripts/finalize-web-build.py'
      - 'scripts/patch-iroh-flutter.py'
      - '.github/workflows/build-flutter.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    name: Dart tests and web build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: flutter/packages/flterm/.tmp/flterm-0.0.4.tar.gz
          key: flterm-test-assets-0.0.4-d903c7c768f067bcd
      - name: Install web compiler dependencies
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Analyze and test shared client
        run: mise exec -- just flutter-check
      - name: Build relay-only Flutter web client
        run: mise exec -- just build-web

  android:
    name: Android debug package
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;28.2.13676358
      - name: Build APK
        run: mise exec -- just build-flutter-android-debug
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-android-${{ github.sha }}
          path: flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  linux:
    name: Linux desktop bundle
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Install Linux desktop dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          clang cmake libgtk-3-dev libsecret-1-dev ninja-build pkg-config
      - name: Build Linux client
        run: mise exec -- just build-flutter-linux
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-linux-${{ github.sha }}
          path: flutter/build/linux/x64/release/bundle/**
          if-no-files-found: error

  windows:
    name: Windows desktop bundle
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Build and package Windows client
        run: mise exec -- just build-flutter-windows-release v0.0.0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          name: zuko-flutter-windows-${{ github.sha }}
          path: flutter/build/windows/x64/runner/Release/**
          if-no-files-found: error
          retention-days: 7
