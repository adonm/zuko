name: ios

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-ios.yml'
      - '.swiftlint.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'ios/**'
      - 'mise.toml'
      - 'scripts/build-ffi.sh'
      - 'scripts/build-ios-xtool.sh'
      - 'scripts/patch-ios-plist.sh'
      - 'scripts/patch-iroh-framework.sh'
      - 'scripts/setup-ios-sdk.sh'
      - 'scripts/setup-xtool.sh'
      - 'scripts/version.sh'
      - 'src/**'
      - 'uniffi-bindgen.rs'
      - 'uniffi.toml'
  pull_request:
    paths:
      - '.github/workflows/build-ios.yml'
      - '.swiftlint.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'ios/**'
      - 'mise.toml'
      - 'scripts/build-ffi.sh'
      - 'scripts/build-ios-xtool.sh'
      - 'scripts/patch-ios-plist.sh'
      - 'scripts/patch-iroh-framework.sh'
      - 'scripts/setup-ios-sdk.sh'
      - 'scripts/setup-xtool.sh'
      - 'scripts/version.sh'
      - 'src/**'
      - 'uniffi-bindgen.rs'
      - 'uniffi.toml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Bump in lockstep with bootstrap-xtoolsdk.yml's `tag` input. The SDK is large,
# so Linux CI downloads it once per tag and then restores it from actions/cache.
env:
  XTOOLSDK_TAG: xtoolsdk-v1

jobs:
  build:
    name: Build iOS app (xtool)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: mise install (rust + swiftlint)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: SwiftLint
        run: mise run lint

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ios-xtool

      - name: Install local iOS tooling (Swift + xtool)
        run: mise run setup-ios

      - name: ZukoWire unit tests
        # Foundation-only wire-protocol package — runs on Linux like the Rust
        # wire tests, guarding the framing contract against drift. Cheap; fails
        # fast before the expensive FFI + xtool build.
        run: mise run test-ios-wire

      - name: Cache xtool Darwin SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zuko/xtoolsdk
          key: xtoolsdk-${{ env.XTOOLSDK_TAG }}-x86_64

      - name: Resolve version env
        run: |
          echo "ZUKO_VERSION=$(sh scripts/version.sh)" >> "$GITHUB_ENV"
          echo "ZUKO_BUILD_NUMBER=$(date -u +%s)" >> "$GITHUB_ENV"

      - name: xtool build
        env:
          ZUKO_VERSION: ${{ env.ZUKO_VERSION }}
          ZUKO_BUILD_NUMBER: ${{ env.ZUKO_BUILD_NUMBER }}
        run: mise run build-ios

      - name: Upload app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Zuko-app
          path: ios/xtool/Zuko.app
          if-no-files-found: error
