name: ios

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS app (simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          set -e
          xcode=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $xcode"
          sudo xcode-select -s "$xcode"
          xcodebuild -version
          xcrun simctl list runtimes available || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/Zuko
        run: xcodegen generate

      - name: Resolve Swift packages
        working-directory: ios/Zuko
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Zuko.xcodeproj \
            -scheme Zuko

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          dest="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)["devices"]
          for runtime, devs in data.items():
              if "iOS" not in runtime:
                  continue
              for dev in devs:
                  if dev.get("isAvailable") and "iPhone" in dev.get("name", ""):
                      print("platform=iOS Simulator,id=" + dev["udid"])
                      sys.exit(0)
          sys.exit(1)
          ')"
          echo "destination=$dest" >> "$GITHUB_OUTPUT"
          echo "Picked destination: $dest"

      - name: Build (iOS Simulator)
        working-directory: ios/Zuko
        run: |
          xcodebuild build \
            -project Zuko.xcodeproj \
            -scheme Zuko \
            -destination '${{ steps.sim.outputs.destination }}' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate .app
        id: app
        working-directory: ios/Zuko
        run: |
          app="$(find build/Build/Products -name 'Zuko.app' -type d | head -1)"
          echo "path=$app" >> "$GITHUB_OUTPUT"
          echo "Found $app"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Zuko-app
          path: ${{ steps.app.outputs.path }}
          if-no-files-found: error
