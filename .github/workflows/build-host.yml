name: host

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: mise install
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Ensure clippy/rustfmt (reliable across cached toolchains)
        run: rustup component add clippy rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: host

      - name: Clippy + tests
        run: mise run test-host

      - name: Build (release)
        run: mise run build-host

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zuko-host-${{ runner.os }}
          path: host/target/release/zuko-host
          if-no-files-found: error
