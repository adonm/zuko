name: publish-flutter-android

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Immutable release tag to publish (vX.Y.Z)"
        required: true
        type: string
      artifact_source:
        description: "Use the signed GitHub Release AAB or rebuild from the tag"
        required: true
        default: release
        type: choice
        options:
          - release
          - rebuild
      track:
        description: "Google Play track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      publish_mode:
        description: "Create a draft or release it to the selected track"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - release

permissions:
  contents: read

concurrency:
  group: google-play-dev-adonm-zuko-${{ inputs.track }}
  cancel-in-progress: false

jobs:
  prepare:
    name: resolve immutable release identity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      sha: ${{ steps.identity.outputs.sha }}
      tag_object: ${{ steps.identity.outputs.tag_object }}
      version: ${{ steps.identity.outputs.version }}
      version_code: ${{ steps.identity.outputs.version_code }}
      package: ${{ steps.identity.outputs.package }}
      asset: ${{ steps.identity.outputs.asset }}
      asset_digest: ${{ steps.release.outputs.asset_digest }}
      checksum_digest: ${{ steps.release.outputs.checksum_digest }}
    steps:
      - name: Check out trusted publishing tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: tooling

      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          path: release-source

      - name: Validate workflow and release identity
        id: identity
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != refs/heads/main ]; then
            echo "Publishing must be dispatched from the main branch" >&2
            exit 1
          fi
          python3 tooling/scripts/android-release-metadata.py \
            --source release-source \
            --tag "$TAG" >> "$GITHUB_OUTPUT"

      - name: Snapshot signed release asset digests
        if: ${{ inputs.artifact_source == 'release' }}
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.identity.outputs.tag }}
          ASSET: ${{ steps.identity.outputs.asset }}
        run: |
          set -euo pipefail
          endpoint="repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          draft="$(gh api "$endpoint" --jq '.draft')"
          prerelease="$(gh api "$endpoint" --jq '.prerelease')"
          [ "$draft" = false ]
          [ "$prerelease" = false ]
          asset_digest="$(gh api "$endpoint" --jq \
            ".assets | map(select(.name == \"${ASSET}\")) | if length == 1 then .[0].digest else error(\"AAB missing or duplicated\") end")"
          checksum_digest="$(gh api "$endpoint" --jq \
            ".assets | map(select(.name == \"${ASSET}.sha256\")) | if length == 1 then .[0].digest else error(\"checksum missing or duplicated\") end")"
          [[ "$asset_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$checksum_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "asset_digest=$asset_digest" >> "$GITHUB_OUTPUT"
          echo "checksum_digest=$checksum_digest" >> "$GITHUB_OUTPUT"

  package:
    name: ${{ inputs.artifact_source }} Android bundle
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check out release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          path: release-source
          submodules: recursive

      - name: Check out trusted publishing tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: tooling

      - name: Revalidate immutable tag
        run: |
          set -euo pipefail
          python3 tooling/scripts/android-release-metadata.py \
            --source release-source \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --commit "${{ needs.prepare.outputs.sha }}" \
            --tag-object "${{ needs.prepare.outputs.tag_object }}" >/dev/null

      - name: Download exact signed GitHub Release AAB
        if: ${{ inputs.artifact_source == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          ASSET: ${{ needs.prepare.outputs.asset }}
          ASSET_DIGEST: ${{ needs.prepare.outputs.asset_digest }}
          CHECKSUM_DIGEST: ${{ needs.prepare.outputs.checksum_digest }}
        run: |
          set -euo pipefail
          mkdir -p dist/android
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --dir dist/android \
            --pattern "$ASSET" \
            --pattern "$ASSET.sha256"
          actual_asset="sha256:$(sha256sum "dist/android/$ASSET" | cut -d' ' -f1)"
          actual_checksum="sha256:$(sha256sum "dist/android/$ASSET.sha256" | cut -d' ' -f1)"
          [ "$actual_asset" = "$ASSET_DIGEST" ]
          [ "$actual_checksum" = "$CHECKSUM_DIGEST" ]
          (cd dist/android && sha256sum --strict --check "$ASSET.sha256")

      - name: Set up release toolchain
        if: ${{ inputs.artifact_source == 'rebuild' }}
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_save: false
          install_args: flutter rust
          working_directory: release-source

      - name: Set up Java 17
        if: ${{ inputs.artifact_source == 'rebuild' }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Rust build
        if: ${{ inputs.artifact_source == 'rebuild' }}
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: flutter-android-store-rebuild
          save-if: false

      - name: Set up Android SDK
        if: ${{ inputs.artifact_source == 'rebuild' }}
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;28.2.13676358

      - name: Natively rebuild unsigned AAB from tag
        if: ${{ inputs.artifact_source == 'rebuild' }}
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          pushd release-source/flutter >/dev/null
          mise exec -- flutter pub get --enforce-lockfile
          mise exec -- flutter build appbundle \
            --release \
            --no-pub \
            --build-name "$VERSION" \
            --build-number "$VERSION_CODE"
          popd >/dev/null
          mkdir -p dist/android
          cp release-source/flutter/build/app/outputs/bundle/release/app-release.aab \
            "dist/android/zuko-android-${TAG}-unsigned.aab"

      - name: Upload package for protected publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-android-publish-${{ needs.prepare.outputs.tag }}-${{ github.run_id }}
          path: dist/android/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish to Google Play ${{ inputs.track }}
    needs: [prepare, package]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: google-play
    steps:
      - name: Check out trusted publishing tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: tooling

      - name: Check out release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          path: release-source

      - name: Download package selected for publishing
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-android-publish-${{ needs.prepare.outputs.tag }}-${{ github.run_id }}
          path: staging

      - name: Set up Java 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.13.14
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: 3.13.14
          cache: pip
          cache-dependency-path: tooling/scripts/codemagic-requirements.txt

      - name: Install pinned Codemagic CLI Tools
        run: tooling/scripts/install-codemagic.sh

      - name: Revalidate tag and prepare exact signed AAB
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAG: ${{ needs.prepare.outputs.tag }}
          ASSET: ${{ needs.prepare.outputs.asset }}
        run: |
          set -euo pipefail
          python3 tooling/scripts/android-release-metadata.py \
            --source release-source \
            --tag "$TAG" \
            --commit "${{ needs.prepare.outputs.sha }}" \
            --tag-object "${{ needs.prepare.outputs.tag_object }}" >/dev/null
          mkdir -p dist/android
          if [ "${{ inputs.artifact_source }}" = release ]; then
            input="staging/$ASSET"
            checksum="staging/$ASSET.sha256"
            mode=preserve
          else
            input="staging/zuko-android-${TAG}-unsigned.aab"
            checksum="dist/android/$ASSET.sha256"
            mode=sign
          fi
          output="dist/android/$ASSET"
          tooling/scripts/android-prepare-aab.sh "$mode" "$input" "$output"
          if [ "$mode" = sign ]; then
            (cd dist/android && sha256sum "$ASSET" > "$ASSET.sha256")
          else
            cp "$checksum" "dist/android/$ASSET.sha256"
          fi
          tooling/scripts/android-validate-aab.sh \
            "$output" \
            "dist/android/$ASSET.sha256" \
            "${{ needs.prepare.outputs.package }}" \
            "${{ needs.prepare.outputs.version }}" \
            "${{ needs.prepare.outputs.version_code }}"
          echo "AAB_SHA256=$(sha256sum "$output" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Retain the validated signed AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-android-google-play-${{ needs.prepare.outputs.tag }}-${{ github.run_id }}
          path: dist/android/*
          if-no-files-found: error
          retention-days: 30

      - name: Validate Google Play access and publish exact AAB
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          TAG: ${{ needs.prepare.outputs.tag }}
          ASSET: ${{ needs.prepare.outputs.asset }}
        run: |
          set -euo pipefail
          python3 tooling/scripts/android-release-metadata.py \
            --source release-source \
            --tag "$TAG" \
            --commit "${{ needs.prepare.outputs.sha }}" \
            --tag-object "${{ needs.prepare.outputs.tag_object }}" >/dev/null
          tooling/scripts/android-upload-google-play.sh \
            "dist/android/$ASSET" \
            "$AAB_SHA256" \
            "${{ needs.prepare.outputs.package }}" \
            "${{ inputs.track }}" \
            "${{ inputs.publish_mode }}" \
            "Zuko $TAG"
