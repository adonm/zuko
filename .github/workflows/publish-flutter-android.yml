name: publish-flutter-android

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable release tag to publish (vX.Y.Z)
        required: true
        type: string
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]
      publish_mode:
        description: Create a draft or release it to the selected track
        required: true
        default: draft
        type: choice
        options: [draft, release]

permissions:
  contents: read

concurrency:
  group: google-play-dev-adonm-zuko-${{ inputs.track }}
  cancel-in-progress: false

jobs:
  prepare:
    name: resolve immutable release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      asset: ${{ steps.identity.outputs.asset }}
      package: ${{ steps.identity.outputs.package }}
      sha: ${{ steps.identity.outputs.sha }}
      tag: ${{ steps.identity.outputs.tag }}
      version: ${{ steps.identity.outputs.version }}
      version_code: ${{ steps.identity.outputs.version_code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Resolve release context
        id: identity
        env:
          TAG: ${{ inputs.tag }}
        run: scripts/release-context.sh "$TAG"

  publish:
    name: publish existing AAB to Google Play ${{ inputs.track }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: google-play
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Java 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: ./.github/actions/setup-codemagic

      - name: Download and validate exact GitHub Release AAB
        env:
          ASSET: ${{ needs.prepare.outputs.asset }}
          PACKAGE: ${{ needs.prepare.outputs.package }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
        run: |
          set -euo pipefail
          base="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          mkdir -p dist/android
          curl --fail --location --proto '=https' --tlsv1.2 \
            "$base/$ASSET" -o "dist/android/$ASSET"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "$base/$ASSET.sha256" -o "dist/android/$ASSET.sha256"
          scripts/android-validate-aab.sh \
            "dist/android/$ASSET" "dist/android/$ASSET.sha256" \
            "$PACKAGE" "$VERSION" "$VERSION_CODE"
          echo "AAB_SHA256=$(sha256sum "dist/android/$ASSET" | cut -d' ' -f1)" \
            >> "$GITHUB_ENV"

      - name: Publish validated AAB
        env:
          ASSET: ${{ needs.prepare.outputs.asset }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PACKAGE: ${{ needs.prepare.outputs.package }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: >-
          scripts/android-upload-google-play.sh
          "dist/android/$ASSET" "$AAB_SHA256" "$PACKAGE"
          "${{ inputs.track }}" "${{ inputs.publish_mode }}" "Zuko $TAG"
