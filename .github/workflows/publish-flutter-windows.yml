name: publish-flutter-windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Immutable release tag (vX.Y.Z)"
        required: true
        type: string
      lane:
        description: "Upload a Partner Center draft or approve and commit it"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - submit

permissions:
  contents: read

concurrency:
  group: microsoft-store-dev-adonm-zuko
  cancel-in-progress: false

jobs:
  prepare:
    name: validate immutable release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate tag, versions, and remote target
        id: release
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]] || {
            echo "Tag must match vX.Y.Z" >&2
            exit 1
          }
          version="${TAG#v}"
          [ "$version" = "$(scripts/version.sh)" ] || {
            echo "Tag does not match the workspace version" >&2
            exit 1
          }
          python3 scripts/check-release-metadata.py
          sha="$(git rev-parse HEAD)"
          [ "$sha" = "$(git rev-parse "$TAG^{commit}")" ] || {
            echo "Checked-out commit does not match the tag" >&2
            exit 1
          }
          remote_tag="$(git ls-remote --refs origin "refs/tags/$TAG" | cut -f1)"
          remote_peeled="$(git ls-remote origin "refs/tags/$TAG^{}" | cut -f1)"
          remote_sha="${remote_peeled:-$remote_tag}"
          if [ -z "$remote_sha" ] || [ "$sha" != "$remote_sha" ]; then
            echo "Remote tag is missing or does not resolve to the checked-out commit" >&2
            exit 1
          fi
          {
            echo "tag=$TAG"
            echo "sha=$sha"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  package:
    name: build and sign Store package
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 90
    environment: microsoft-store-package
    env:
      MSSTORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
      MSSTORE_PACKAGE_IDENTITY_NAME: ${{ vars.MSSTORE_PACKAGE_IDENTITY_NAME }}
      MSSTORE_PACKAGE_PUBLISHER: ${{ vars.MSSTORE_PACKAGE_PUBLISHER }}
      MSSTORE_PACKAGE_FAMILY_NAME: ${{ vars.MSSTORE_PACKAGE_FAMILY_NAME }}
      MSSTORE_PACKAGE_DISPLAY_NAME: ${{ vars.MSSTORE_PACKAGE_DISPLAY_NAME }}
      MSSTORE_PUBLISHER_DISPLAY_NAME: ${{ vars.MSSTORE_PUBLISHER_DISPLAY_NAME }}
      MSSTORE_SIGNING_PFX_BASE64: ${{ secrets.MSSTORE_SIGNING_PFX_BASE64 }}
      MSSTORE_SIGNING_PFX_PASSWORD: ${{ secrets.MSSTORE_SIGNING_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          submodules: recursive

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_save: false
          install_args: flutter rust

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: flutter-windows-store
          save-if: false

      - name: Build locked Flutter Windows release
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $flutter = Join-Path (mise where flutter) "bin/flutter.bat"
          $rustBin = Join-Path (mise where rust) "bin"
          $env:Path = "$rustBin;$env:Path"
          Push-Location flutter
          & $flutter pub get --enforce-lockfile
          Pop-Location
          python scripts/patch-iroh-flutter.py flutter
          Push-Location flutter
          & $flutter build windows --release --no-pub `
            --build-name $env:RELEASE_VERSION `
            --build-number 0
          Pop-Location

      - name: Package, sign, and verify MSIX artifacts
        shell: pwsh
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          ./flutter/windows/store/Package.ps1 `
            -Tag $env:TAG `
            -ExpectedSha $env:EXPECTED_SHA `
            -BuildDirectory flutter/build/windows/x64/runner/Release `
            -OutputDirectory dist/windows-store

      - name: Upload signed Store artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-windows-store-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: |
            dist/windows-store/*.msix
            dist/windows-store/*.msixbundle
            dist/windows-store/*.sha256
            dist/windows-store/package-metadata.json
          if-no-files-found: error
          retention-days: 7

  draft:
    name: upload Partner Center draft
    needs: [prepare, package]
    runs-on: windows-latest
    timeout-minutes: 30
    environment: microsoft-store-draft
    env:
      MSSTORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
      MSSTORE_PACKAGE_IDENTITY_NAME: ${{ vars.MSSTORE_PACKAGE_IDENTITY_NAME }}
      MSSTORE_PACKAGE_PUBLISHER: ${{ vars.MSSTORE_PACKAGE_PUBLISHER }}
      MSSTORE_PACKAGE_FAMILY_NAME: ${{ vars.MSSTORE_PACKAGE_FAMILY_NAME }}
      MSSTORE_PACKAGE_DISPLAY_NAME: ${{ vars.MSSTORE_PACKAGE_DISPLAY_NAME }}
      MSSTORE_PUBLISHER_DISPLAY_NAME: ${{ vars.MSSTORE_PUBLISHER_DISPLAY_NAME }}
      MSSTORE_TENANT_ID: ${{ vars.MSSTORE_TENANT_ID }}
      MSSTORE_SELLER_ID: ${{ vars.MSSTORE_SELLER_ID }}
      MSSTORE_CLIENT_ID: ${{ vars.MSSTORE_CLIENT_ID }}
      MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-windows-store-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: dist/windows-store

      - name: Revalidate release and signed artifact
        shell: pwsh
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          ./flutter/windows/store/Test-ReleaseTag.ps1 -Tag $env:TAG -ExpectedSha $env:EXPECTED_SHA
          ./flutter/windows/store/Test-Package.ps1 `
            -Tag $env:TAG `
            -ExpectedSha $env:EXPECTED_SHA `
            -InputDirectory dist/windows-store

      - name: Set up pinned Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4 # v1.3
        with:
          version: v0.3.9

      - name: Validate protected Partner Center identity
        shell: pwsh
        run: ./flutter/windows/store/Test-PartnerCenter.ps1

      - name: Upload package without committing submission
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $bundles = @(Get-ChildItem dist/windows-store -Filter *.msixbundle)
          if ($bundles.Count -ne 1) { throw "Expected exactly one MSIXBundle" }
          msstore publish $bundles[0].FullName `
            --appId $env:MSSTORE_PRODUCT_ID `
            --noCommit

  submit:
    name: approve and commit Store submission
    if: ${{ inputs.lane == 'submit' }}
    needs: [prepare, draft]
    runs-on: windows-latest
    timeout-minutes: 20
    environment: microsoft-store-submit
    env:
      MSSTORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
      MSSTORE_PACKAGE_IDENTITY_NAME: ${{ vars.MSSTORE_PACKAGE_IDENTITY_NAME }}
      MSSTORE_PACKAGE_PUBLISHER: ${{ vars.MSSTORE_PACKAGE_PUBLISHER }}
      MSSTORE_PACKAGE_FAMILY_NAME: ${{ vars.MSSTORE_PACKAGE_FAMILY_NAME }}
      MSSTORE_PACKAGE_DISPLAY_NAME: ${{ vars.MSSTORE_PACKAGE_DISPLAY_NAME }}
      MSSTORE_PUBLISHER_DISPLAY_NAME: ${{ vars.MSSTORE_PUBLISHER_DISPLAY_NAME }}
      MSSTORE_TENANT_ID: ${{ vars.MSSTORE_TENANT_ID }}
      MSSTORE_SELLER_ID: ${{ vars.MSSTORE_SELLER_ID }}
      MSSTORE_CLIENT_ID: ${{ vars.MSSTORE_CLIENT_ID }}
      MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-windows-store-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: dist/windows-store

      - name: Revalidate release and signed artifact
        shell: pwsh
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          ./flutter/windows/store/Test-ReleaseTag.ps1 -Tag $env:TAG -ExpectedSha $env:EXPECTED_SHA
          ./flutter/windows/store/Test-Package.ps1 `
            -Tag $env:TAG `
            -ExpectedSha $env:EXPECTED_SHA `
            -InputDirectory dist/windows-store

      - name: Set up pinned Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4 # v1.3
        with:
          version: v0.3.9

      - name: Revalidate protected Partner Center identity
        shell: pwsh
        run: ./flutter/windows/store/Test-PartnerCenter.ps1

      - name: Commit existing draft submission
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          msstore submission publish $env:MSSTORE_PRODUCT_ID
