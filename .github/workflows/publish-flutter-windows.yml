name: publish-flutter-windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Immutable release tag to publish (vX.Y.Z)"
        required: true
        type: string
      lane:
        description: "Upload a Partner Center draft or approve and commit it"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - submit

permissions:
  contents: read

concurrency:
  group: microsoft-store-dev-adonm-zuko
  cancel-in-progress: false

jobs:
  prepare:
    name: resolve release version and source
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: just

      - name: Resolve release context
        id: release
        env:
          TAG: ${{ inputs.tag }}
        run: mise exec -- just release-context "$TAG"

  package:
    name: build and sign Store package
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 90
    environment: microsoft-store-package
    env:
      MSSTORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
      MSSTORE_PACKAGE_IDENTITY_NAME: ${{ vars.MSSTORE_PACKAGE_IDENTITY_NAME }}
      MSSTORE_PACKAGE_PUBLISHER: ${{ vars.MSSTORE_PACKAGE_PUBLISHER }}
      MSSTORE_PACKAGE_FAMILY_NAME: ${{ vars.MSSTORE_PACKAGE_FAMILY_NAME }}
      MSSTORE_PACKAGE_DISPLAY_NAME: ${{ vars.MSSTORE_PACKAGE_DISPLAY_NAME }}
      MSSTORE_PUBLISHER_DISPLAY_NAME: ${{ vars.MSSTORE_PUBLISHER_DISPLAY_NAME }}
      MSSTORE_SIGNING_PFX_BASE64: ${{ secrets.MSSTORE_SIGNING_PFX_BASE64 }}
      MSSTORE_SIGNING_PFX_PASSWORD: ${{ secrets.MSSTORE_SIGNING_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust zig just http:flutter


      - name: Build locked Flutter Windows release
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: mise exec -- just build-flutter-windows-store "$env:RELEASE_VERSION"

      - name: Package, sign, and verify MSIX artifacts
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.sha }}
        run: mise exec -- just package-windows-store "$env:TAG" "$env:EXPECTED_SHA"

      - name: Upload signed Store artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-windows-store-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: |
            dist/windows-store/*.msix
            dist/windows-store/*.msixbundle
            dist/windows-store/*.sha256
            dist/windows-store/package-metadata.json
          if-no-files-found: error
          retention-days: 7

  draft:
    name: upload Partner Center draft
    needs: [prepare, package]
    runs-on: windows-latest
    timeout-minutes: 30
    environment: microsoft-store-draft
    env:
      MSSTORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
      MSSTORE_PACKAGE_IDENTITY_NAME: ${{ vars.MSSTORE_PACKAGE_IDENTITY_NAME }}
      MSSTORE_PACKAGE_PUBLISHER: ${{ vars.MSSTORE_PACKAGE_PUBLISHER }}
      MSSTORE_PACKAGE_FAMILY_NAME: ${{ vars.MSSTORE_PACKAGE_FAMILY_NAME }}
      MSSTORE_PACKAGE_DISPLAY_NAME: ${{ vars.MSSTORE_PACKAGE_DISPLAY_NAME }}
      MSSTORE_PUBLISHER_DISPLAY_NAME: ${{ vars.MSSTORE_PUBLISHER_DISPLAY_NAME }}
      MSSTORE_TENANT_ID: ${{ vars.MSSTORE_TENANT_ID }}
      MSSTORE_SELLER_ID: ${{ vars.MSSTORE_SELLER_ID }}
      MSSTORE_CLIENT_ID: ${{ vars.MSSTORE_CLIENT_ID }}
      MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-windows-store-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: dist/windows-store

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: just

      - name: Revalidate source and signed artifact
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.sha }}
        run: mise exec -- just validate-windows-store "$env:TAG" "$env:EXPECTED_SHA"

      - name: Set up pinned Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4 # v1.3
        with:
          version: v0.3.9

      - name: Validate protected Partner Center identity
        run: mise exec -- just validate-partner-center

      - name: Upload package without committing submission
        run: mise exec -- just upload-windows-store-draft

      - name: Capture exact Partner Center draft identity
        run: mise exec -- just capture-windows-store-draft

      - name: Upload draft identity for approval
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-windows-store-draft-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: dist/windows-store/submission-identity.json
          if-no-files-found: error
          retention-days: 7

  submit:
    name: approve and commit Store submission
    if: ${{ inputs.lane == 'submit' }}
    needs: [prepare, draft]
    runs-on: windows-latest
    timeout-minutes: 20
    environment: microsoft-store-submit
    env:
      MSSTORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
      MSSTORE_PACKAGE_IDENTITY_NAME: ${{ vars.MSSTORE_PACKAGE_IDENTITY_NAME }}
      MSSTORE_PACKAGE_PUBLISHER: ${{ vars.MSSTORE_PACKAGE_PUBLISHER }}
      MSSTORE_PACKAGE_FAMILY_NAME: ${{ vars.MSSTORE_PACKAGE_FAMILY_NAME }}
      MSSTORE_PACKAGE_DISPLAY_NAME: ${{ vars.MSSTORE_PACKAGE_DISPLAY_NAME }}
      MSSTORE_PUBLISHER_DISPLAY_NAME: ${{ vars.MSSTORE_PUBLISHER_DISPLAY_NAME }}
      MSSTORE_TENANT_ID: ${{ vars.MSSTORE_TENANT_ID }}
      MSSTORE_SELLER_ID: ${{ vars.MSSTORE_SELLER_ID }}
      MSSTORE_CLIENT_ID: ${{ vars.MSSTORE_CLIENT_ID }}
      MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-windows-store-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: dist/windows-store

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-windows-store-draft-${{ needs.prepare.outputs.tag }}-${{ needs.prepare.outputs.sha }}
          path: dist/windows-store

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: just

      - name: Revalidate source and signed artifact
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.sha }}
        run: mise exec -- just validate-windows-store "$env:TAG" "$env:EXPECTED_SHA"

      - name: Set up pinned Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4 # v1.3
        with:
          version: v0.3.9

      - name: Revalidate protected Partner Center identity
        run: mise exec -- just validate-partner-center

      - name: Verify approved draft is still current
        run: mise exec -- just verify-windows-store-draft

      - name: Commit existing draft submission
        run: mise exec -- just submit-windows-store
