name: release

# Builds release binaries for `zuko` and publishes them to GitHub Releases.
# The install script consumes these via mise's `github:` backend (one binary,
# both `zuko host` and `zuko connect`).
#
# Tools come from mise (mise.toml); the aarch64-linux cross-compiler comes from
# mise [bootstrap.packages]. CI just sets the matrix + target.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: validate release identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      sha: ${{ steps.identity.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Resolve release version and source
        id: identity
        env:
          TAG: ${{ github.ref_name }}
        run: mise exec -- just release-context "$TAG"

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: native on ubuntu (x86_64), cross on ubuntu (aarch64).
          # macOS: both targets build on Apple Silicon hardware (currently
          # macos-latest = macos-15) — Rust + Apple's `clang` cross-compile
          # x86_64-apple-darwin natively, so there's no need to wait on the
          # scarce (and shrinking) Intel macos-13 runner pool. Apple stopped
          # selling Intel Macs in 2020; building Intel binaries on Apple
          # Silicon is well-supported. Tracking macos-latest keeps us off
          # stale runner images without affecting the cross-compile target.
          #
          # `zuko app` is part of the normal Linux build; it is not wired into
          # non-Linux binaries. The Linux x86_64 tarball additionally
          # bundles cage + wlroots libs (see the "Bundle cage" step below).
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu,  cross: false }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true  }
          - { runner: macos-latest,  target: x86_64-apple-darwin,       cross: false }
          - { runner: macos-latest,  target: aarch64-apple-darwin,      cross: false }
    runs-on: ${{ matrix.runner }}
    env:
      ZUKO_TARGET: ${{ matrix.target }}
      ARTIFACT: zuko-${{ matrix.target }}.tar.gz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true


      - name: Install cross toolchain (linux aarch64)
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update
          mise bootstrap packages apply --yes apt:gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Select Xcode 26.3
        if: ${{ endsWith(matrix.target, '-apple-darwin') }}
        run: mise exec -- just select-xcode

      - name: Build release (target = ${{ matrix.target }})
        # The Linux target includes `zuko app`; non-Linux targets do not wire in
        # that subcommand, so the same command builds all platforms.
        run: mise exec -- just build-cli-release "$ZUKO_TARGET"

      - name: Bundle cage + libs (x86_64-linux only)
        # `zuko app` spawns cage headless (WLR_BACKENDS=headless WLR_RENDERER=pixman);
        # we ship cage next to the zuko binary so `mise use` delivers a working
        # app mode with no extra setup. Done in a Fedora container so the binary
        # matches what we tested (cage 0.3.0 + wlroots 0.20.1) regardless of the
        # Ubuntu runner. aarch64 cage bundling is a follow-up (needs QEMU); until
        # then aarch64 `zuko app` finds cage on PATH.
        # NOTE: no apostrophes inside the bash -c '...' block — they close the
        # single-quoted argument and break the quoting.
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: mise exec -- just bundle-cage

      - name: Package
        run: mise exec -- just package-cli-release "$ZUKO_TARGET"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          if-no-files-found: error

  android:
    name: build Flutter Android release packages
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true


      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;28.2.13676358

      - name: Configure Android signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: mise exec -- just configure-android-signing

      - name: Test and build Flutter Android packages
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: mise exec -- just build-flutter-android

      - name: Name and checksum Android assets
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
        run: mise exec -- just package-android-release "$TAG" "$SIGNING_MODE"

      - name: Upload Android release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-android-${{ needs.prepare.outputs.tag }}
          path: dist/android/*
          if-no-files-found: error

  linux:
    name: build Flutter Linux Flatpak (x86_64)
    needs: prepare
    runs-on: ubuntu-24.04
    container:
      # freedesktop-25.08 with the exact x86_64 Platform/SDK commits checked by
      # scripts/package-flatpak.sh; the LLVM extension is pinned separately.
      image: ghcr.io/flathub-infra/flatpak-github-actions@sha256:bc5938197c339664f893828925061b08486e7f355c3e91eefcaae7293d3cfd6b
      options: --privileged
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - name: Trust container checkout ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true


      - name: Install pinned LLVM toolchain
        run: |
          set -euo pipefail
          mise exec -- just install-flatpak-llvm /opt/llvm
          echo /opt/llvm/bin >> "$GITHUB_PATH"
          export PATH="/opt/llvm/bin:$PATH"
          dbus-uuidgen --ensure=/etc/machine-id
          clang --version
          clang++ --version

      - name: Build locked Flutter Linux client
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: mise exec -- just build-flutter-linux-release "$RELEASE_SHA"

      - name: Package and smoke-test Flatpak offline
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          mise exec -- just prepare-flatpak-release "$TAG" "$RELEASE_SHA"
          mise exec -- just package-flatpak-release "$TAG" "$RELEASE_SHA"

      - name: Upload Linux Flatpak release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-linux-${{ needs.prepare.outputs.tag }}-x86_64
          path: |
            dist/linux/*.flatpak
            dist/linux/*.flatpak.sha256
          if-no-files-found: error

  linux-arm-build:
    name: cross-build Flutter Linux bundle (aarch64)
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Install cross compiler and pinned ARM64 sysroot
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake flatpak lld llvm ninja-build pkg-config
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo scripts/install-flatpak-sysroot.sh \
            aarch64 /opt/aarch64-sysroot
      - name: Cross-build locked Flutter Linux client
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: >-
          mise exec -- just build-flutter-linux-release "$RELEASE_SHA"
          linux-arm64 /opt/aarch64-sysroot
      - name: Preserve ARM64 bundle metadata
        run: >-
          tar -czf flutter-linux-aarch64.tar.gz
          -C flutter/build/linux/arm64/release bundle
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: internal-flutter-linux-aarch64-${{ needs.prepare.outputs.tag }}
          path: flutter-linux-aarch64.tar.gz
          if-no-files-found: error

  linux-arm:
    name: package Flutter Linux Flatpak (aarch64)
    needs: [prepare, linux-arm-build]
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions@sha256:bc5938197c339664f893828925061b08486e7f355c3e91eefcaae7293d3cfd6b
      options: --privileged
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - name: Trust container checkout ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: internal-flutter-linux-aarch64-${{ needs.prepare.outputs.tag }}
      - name: Restore ARM64 Flutter bundle
        run: |
          mkdir -p flutter/build/linux/arm64/release
          tar -xzf flutter-linux-aarch64.tar.gz \
            -C flutter/build/linux/arm64/release
      - name: Package and smoke-test Flatpak offline
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          dbus-uuidgen --ensure=/etc/machine-id
          python3 scripts/prepare-flatpak-release.py "$TAG" "$RELEASE_SHA"
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$RELEASE_SHA")"
          export SOURCE_DATE_EPOCH
          dbus-run-session -- bash scripts/package-flatpak.sh "$TAG"
      - name: Upload Linux ARM64 Flatpak release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-linux-${{ needs.prepare.outputs.tag }}-aarch64
          path: |
            dist/linux/*.flatpak
            dist/linux/*.flatpak.sha256
          if-no-files-found: error

  windows:
    name: build Flutter Windows bundle
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true


      - name: Build and package Windows client
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: mise exec -- just build-flutter-windows-release "$env:TAG"

      - name: Upload Windows release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-windows-${{ needs.prepare.outputs.tag }}
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: [prepare, build, android, linux, linux-arm, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: zuko-*
          path: assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keep the target repository explicit for `gh release create`.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: mise exec -- just publish-github-release "$TAG"
