name: release

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Exact pushed main commit to release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    name: verify exact release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_digest: ${{ steps.candidate.outputs.artifact_digest }}
      artifact_name: ${{ steps.candidate.outputs.artifact_name }}
      candidate_run_id: ${{ steps.candidate.outputs.run_id }}
      sha: ${{ steps.identity.outputs.sha }}
      tag: ${{ steps.identity.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Verify source and release identity
        id: identity
        env:
          REQUESTED_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          [[ "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$REQUESTED_SHA"
          git fetch --quiet origin main --tags
          scripts/release-context.sh
          tag="v$(scripts/version.sh)"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            test "$(git cat-file -t "$tag")" = tag
            test "$(git rev-parse "$tag^{commit}")" = "$REQUESTED_SHA"
          else
            test "$(git rev-parse origin/main)" = "$REQUESTED_SHA"
          fi
          {
            echo "sha=$REQUESTED_SHA"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve successful build-once candidate
        id: candidate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/find_github_candidate.py "${{ inputs.sha }}"

  tag:
    name: publish immutable release tag
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.sha }}
          fetch-depth: 0

      - name: Revalidate main and publish annotated tag once
        env:
          SHA: ${{ needs.verify.outputs.sha }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --quiet origin main --tags
          test "$(git rev-parse HEAD)" = "$SHA"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            test "$(git cat-file -t "$TAG")" = tag
            test "$(git rev-parse "$TAG^{commit}")" = "$SHA"
            echo "Reusing existing exact annotated tag $TAG"
          else
            test "$(git rev-parse origin/main)" = "$SHA"
            git config user.name github-actions
            git config user.email github-actions@github.com
            git tag -a "$TAG" -m "zuko $TAG

            Cut from ${SHA:0:12} after exact-commit candidate verification."
            git push origin "$TAG"
          fi

  assets:
    name: validate and sign candidate assets
    needs: [verify, tag]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.sha }}

      - name: Download exact candidate artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.artifact_name }}
          path: assets
          github-token: ${{ github.token }}
          run-id: ${{ needs.verify.outputs.candidate_run_id }}

      - name: Verify candidate source and bytes
        env:
          GITHUB_CANDIDATE_RUN_ID: ${{ needs.verify.outputs.candidate_run_id }}
        run: >-
          python3 scripts/release_candidate.py verify
          "${{ needs.verify.outputs.sha }}" assets

      - name: Record candidate provenance
        env:
          DIGEST: ${{ needs.verify.outputs.artifact_digest }}
          RUN_ID: ${{ needs.verify.outputs.candidate_run_id }}
        run: |
          {
            echo "Candidate run: \`$RUN_ID\`"
            echo
            echo "Artifact digest: \`$DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Java 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android signing tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: build-tools;36.0.0

      - uses: ./.github/actions/setup-codemagic

      - name: Sign and verify exact Android artifacts
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: scripts/sign-android-release.sh "$TAG" assets

      - name: Upload exact release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-release-assets-${{ needs.verify.outputs.tag }}
          path: assets/*
          if-no-files-found: error
          compression-level: 0

  publish:
    name: publish immutable GitHub Release
    needs: [verify, tag, assets]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-release-assets-${{ needs.verify.outputs.tag }}
          path: assets

      - name: Create or verify immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: scripts/publish-github-release.sh "$TAG"

      - name: Dispatch independent publication channels
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          set -euo pipefail
          gh workflow run publish-crate.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f "tag=$TAG" -f "sha=${{ needs.verify.outputs.sha }}"
          gh workflow run publish-testflight.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f "tag=$TAG" -f "sha=${{ needs.verify.outputs.sha }}"
          gh workflow run publish-appetize.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f "tag=$TAG" -f "sha=${{ needs.verify.outputs.sha }}"
