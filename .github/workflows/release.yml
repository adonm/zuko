name: release

# Builds release binaries for `zuko` and publishes them to GitHub Releases.
# The install script consumes these via mise's `github:` backend (one binary,
# both `zuko host` and `zuko connect`).
#
# Tools come from mise (mise.toml); the aarch64-linux cross-compiler comes from
# mise [bootstrap.packages]. CI just sets the matrix + target.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: native on ubuntu (x86_64), cross on ubuntu (aarch64).
          # macOS: both targets build on Apple Silicon hardware (currently
          # macos-latest = macos-15) — Rust + Apple's `clang` cross-compile
          # x86_64-apple-darwin natively, so there's no need to wait on the
          # scarce (and shrinking) Intel macos-13 runner pool. Apple stopped
          # selling Intel Macs in 2020; building Intel binaries on Apple
          # Silicon is well-supported. Tracking macos-latest keeps us off
          # stale runner images without affecting the cross-compile target.
          #
          # `zuko app` is part of the normal Linux build; it is not wired into
          # non-Linux binaries. The Linux x86_64 tarball additionally
          # bundles cage + wlroots libs (see the "Bundle cage" step below).
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu,  cross: false }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true  }
          - { runner: macos-latest,  target: x86_64-apple-darwin,       cross: false }
          - { runner: macos-latest,  target: aarch64-apple-darwin,      cross: false }
    runs-on: ${{ matrix.runner }}
    env:
      ZUKO_TARGET: ${{ matrix.target }}
      ARTIFACT: zuko-${{ matrix.target }}.tar.gz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: mise install (rust)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Add rust target
        run: rustup target add "${ZUKO_TARGET}"

      - name: Install cross toolchain (linux aarch64)
        if: ${{ matrix.cross }}
        run: |
          mise bootstrap packages install --yes
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release (target = ${{ matrix.target }})
        # The Linux target includes `zuko app`; non-Linux targets do not wire in
        # that subcommand, so the same command builds all platforms.
        run: cargo build --release --target "${ZUKO_TARGET}"

      - name: Bundle cage + libs (x86_64-linux only)
        # `zuko app` spawns cage headless (WLR_BACKENDS=headless WLR_RENDERER=pixman);
        # we ship cage next to the zuko binary so `mise use` delivers a working
        # app mode with no extra setup. Done in a Fedora container so the binary
        # matches what we tested (cage 0.3.0 + wlroots 0.20.1) regardless of the
        # Ubuntu runner. aarch64 cage bundling is a follow-up (needs QEMU); until
        # then aarch64 `zuko app` finds cage on PATH.
        # NOTE: no apostrophes inside the bash -c '...' block — they close the
        # single-quoted argument and break the quoting.
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: |
          set -e
          mkdir -p dist/cage
          docker run --rm -v "$PWD/dist/cage:/out:z" fedora:latest bash -c '
            set -e
            dnf install -y -q --setopt=install_weak_deps=False cage >/dev/null
            cp /usr/bin/cage /out/cage
            chmod 0755 /out/cage
            for lib in libwlroots-0.20.so libliftoff.so.0 libseat.so.1 libxcb-errors.so.0; do
              cp -L "/usr/lib64/$lib" /out/ 2>/dev/null || true
            done
          '
          echo "--- bundled cage ---"
          ls -la dist/cage

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${ZUKO_TARGET}/release/zuko" dist/zuko
          chmod +x dist/zuko
          # Include the cage/ bundle if the previous step populated it (Linux
          # only); macOS tarball is just the binary.
          tar_args=(zuko)
          [ -d dist/cage ] && tar_args+=(cage)
          tar -C dist -czf "$ARTIFACT" "${tar_args[@]}"
          # `sha256sum` is Linux-only; macOS ships `shasum -a 256` (Perl). The
          # two produce byte-identical output (<hash>  <filename>), so consumers
          # don't care which one wrote the .sha256 sidecar.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARTIFACT" > "$ARTIFACT.sha256"
          else
            shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          fi
          echo "--- archive ---"
          tar -tzf "$ARTIFACT"
          echo "--- checksum ---"
          cat "$ARTIFACT.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `gh release create` reads the repo from a git remote by default;
          # this job doesn't checkout the repo (it only needs the downloaded
          # artifacts), so point gh at the repo explicitly via GH_REPO.
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          tag="${{ steps.tag.outputs.tag }}"
          echo "Publishing $tag with:"
          ls -1 assets
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release exists; uploading assets"
            gh release upload "$tag" assets/* --clobber
          else
            gh release create "$tag" assets/* \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi
