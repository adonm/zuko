name: release

# Builds release binaries for `zuko` and publishes them to GitHub Releases.
# The install script consumes these via mise's `github:` backend (one binary,
# both `zuko host` and `zuko connect`).
#
# Tools come from mise (mise.toml); the aarch64-linux cross-compiler comes from
# mise [bootstrap.packages]. CI just sets the matrix + target.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: validate release identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      sha: ${{ steps.identity.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.sha }}
          fetch-depth: 0

      - name: Validate tag, version, and commit
        id: identity
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z: $TAG" >&2
            exit 1
          fi
          expected="v$(scripts/version.sh)"
          if [ "$TAG" != "$expected" ]; then
            echo "Tag $TAG does not match Cargo version $expected" >&2
            exit 1
          fi
          sha=$(git rev-list -n 1 "$TAG")
          if [ -z "$sha" ] || [ "$sha" != "$(git rev-parse HEAD)" ]; then
            echo "Checked-out commit does not match $TAG" >&2
            exit 1
          fi
          if [ "$EVENT_NAME" = push ] && [ "$sha" != "$EVENT_SHA" ]; then
            echo "Tag commit does not match the triggering SHA" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Validate cross-platform release metadata
        run: python3 scripts/check-release-metadata.py

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: native on ubuntu (x86_64), cross on ubuntu (aarch64).
          # macOS: both targets build on Apple Silicon hardware (currently
          # macos-latest = macos-15) — Rust + Apple's `clang` cross-compile
          # x86_64-apple-darwin natively, so there's no need to wait on the
          # scarce (and shrinking) Intel macos-13 runner pool. Apple stopped
          # selling Intel Macs in 2020; building Intel binaries on Apple
          # Silicon is well-supported. Tracking macos-latest keeps us off
          # stale runner images without affecting the cross-compile target.
          #
          # `zuko app` is part of the normal Linux build; it is not wired into
          # non-Linux binaries. The Linux x86_64 tarball additionally
          # bundles cage + wlroots libs (see the "Bundle cage" step below).
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu,  cross: false }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true  }
          - { runner: macos-latest,  target: x86_64-apple-darwin,       cross: false }
          - { runner: macos-latest,  target: aarch64-apple-darwin,      cross: false }
    runs-on: ${{ matrix.runner }}
    env:
      ZUKO_TARGET: ${{ matrix.target }}
      ARTIFACT: zuko-${{ matrix.target }}.tar.gz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: mise install (rust)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_save: ${{ github.event_name == 'workflow_dispatch' }}
          install_args: rust

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Add rust target
        run: rustup target add "${ZUKO_TARGET}"

      - name: Install cross toolchain (linux aarch64)
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update
          mise bootstrap packages install --yes
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release (target = ${{ matrix.target }})
        # The Linux target includes `zuko app`; non-Linux targets do not wire in
        # that subcommand, so the same command builds all platforms.
        run: cargo build --locked --release --target "${ZUKO_TARGET}"

      - name: Bundle cage + libs (x86_64-linux only)
        # `zuko app` spawns cage headless (WLR_BACKENDS=headless WLR_RENDERER=pixman);
        # we ship cage next to the zuko binary so `mise use` delivers a working
        # app mode with no extra setup. Done in a Fedora container so the binary
        # matches what we tested (cage 0.3.0 + wlroots 0.20.1) regardless of the
        # Ubuntu runner. aarch64 cage bundling is a follow-up (needs QEMU); until
        # then aarch64 `zuko app` finds cage on PATH.
        # NOTE: no apostrophes inside the bash -c '...' block — they close the
        # single-quoted argument and break the quoting.
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: |
          set -e
          mkdir -p dist/cage
          docker run --rm -v "$PWD/dist/cage:/out:z" fedora:latest bash -c '
            set -e
            dnf install -y -q --setopt=install_weak_deps=False cage >/dev/null
            cp /usr/bin/cage /out/cage
            chmod 0755 /out/cage
            for lib in libwlroots-0.20.so libliftoff.so.0 libseat.so.1 libxcb-errors.so.0; do
              cp -L "/usr/lib64/$lib" /out/ 2>/dev/null || true
            done
          '
          echo "--- bundled cage ---"
          ls -la dist/cage

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${ZUKO_TARGET}/release/zuko" dist/zuko
          chmod +x dist/zuko
          # Include the cage/ bundle if the previous step populated it (Linux
          # only); macOS tarball is just the binary.
          tar_args=(zuko)
          [ -d dist/cage ] && tar_args+=(cage)
          tar -C dist -czf "$ARTIFACT" "${tar_args[@]}"
          # `sha256sum` is Linux-only; macOS ships `shasum -a 256` (Perl). The
          # two produce byte-identical output (<hash>  <filename>), so consumers
          # don't care which one wrote the .sha256 sidecar.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARTIFACT" > "$ARTIFACT.sha256"
          else
            shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          fi
          echo "--- archive ---"
          tar -tzf "$ARTIFACT"
          echo "--- checksum ---"
          cat "$ARTIFACT.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          if-no-files-found: error

  android:
    name: build Flutter Android release packages
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - name: Install mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_save: ${{ github.event_name == 'workflow_dispatch' }}
          install_args: flutter rust just

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: flutter-android-release
          save-if: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;28.2.13676358

      - name: Configure Android signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          present=0
          for value in "$KEYSTORE_BASE64" "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
            [ -n "$value" ] && present=$((present + 1))
          done
          if [ "$present" -ne 4 ]; then
            echo "Set all four Android signing secrets for release packages" >&2
            exit 1
          else
            keystore="$RUNNER_TEMP/zuko-release.jks"
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore"
            chmod 600 "$keystore"
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "path=$keystore" >> "$GITHUB_OUTPUT"
          fi

      - name: Test and build Flutter Android packages
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: mise run build-flutter-android

      - name: Name and checksum Android assets
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p dist/android
          [ "$SIGNING_MODE" = signed ]
          apk=flutter/build/app/outputs/flutter-apk/app-release.apk
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$apk"
          aab=flutter/build/app/outputs/bundle/release/app-release.aab
          aab_verify=$(jarsigner -verify "$aab" 2>&1)
          case "$aab_verify" in
            *"jar verified"*) echo "AAB JAR signature verified" ;;
            *) printf '%s\n' "$aab_verify" >&2; exit 1 ;;
          esac
          cp "$apk" "dist/android/zuko-android-${TAG}-${SIGNING_MODE}.apk"
          cp "$aab" \
            "dist/android/zuko-android-${TAG}-${SIGNING_MODE}.aab"
          cd dist/android
          for asset in *.apk *.aab; do sha256sum "$asset" > "$asset.sha256"; done

      - name: Upload Android release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-android-${{ needs.prepare.outputs.tag }}
          path: dist/android/*
          if-no-files-found: error

      - name: Upload signed APK to Appetize
        id: appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_ANDROID_PUBLIC_KEY }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          [ -n "$APPETIZE_API_TOKEN" ] || { echo "Set APPETIZE_API_TOKEN" >&2; exit 1; }
          public_key="${APPETIZE_PUBLIC_KEY:--}"
          sh scripts/upload-appetize.sh android \
            "dist/android/zuko-android-${TAG}-signed.apk" \
            "$public_key" \
            "Zuko ${TAG} from GitHub Actions"

  ios-preview:
    name: build Flutter iOS Appetize preview
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - name: Select Xcode 26.3
        run: |
          set -euo pipefail
          xcode=/Applications/Xcode_26.3.app
          test -d "$xcode"
          sudo xcode-select -s "$xcode"
          xcodebuild -version | grep -x 'Xcode 26.3'

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_save: ${{ github.event_name == 'workflow_dispatch' }}
          install_args: flutter rust

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-${{ runner.arch }}-flutter-pub-${{ hashFiles('flutter/pubspec.lock') }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: flutter-ios-appetize
          save-if: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Build locked ARM iOS Simulator client
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mise exec -C flutter -- flutter pub get --enforce-lockfile
          mise exec -C flutter -- flutter build ios --simulator --debug --no-pub \
            --build-name "$version"

      - name: Package and validate Appetize client
        id: package
        run: |
          set -euo pipefail
          app=flutter/build/ios/iphonesimulator/Runner.app
          test -d "$app"
          plist="$app/Info.plist"
          platform=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleSupportedPlatforms:0' "$plist")
          executable=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$plist")
          test "$platform" = iPhoneSimulator
          lipo -archs "$app/$executable" | tr ' ' '\n' | grep -qx arm64
          archive="$RUNNER_TEMP/Zuko-Flutter-ios-simulator.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload Simulator package to Appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_IOS_PUBLIC_KEY }}
          TAG: ${{ needs.prepare.outputs.tag }}
          APP_FILE: ${{ steps.package.outputs.archive }}
        run: |
          set -euo pipefail
          [ -n "$APPETIZE_API_TOKEN" ] || { echo "Set APPETIZE_API_TOKEN" >&2; exit 1; }
          public_key="${APPETIZE_PUBLIC_KEY:--}"
          sh scripts/upload-appetize.sh ios "$APP_FILE" "$public_key" \
            "Zuko ${TAG} iOS Simulator from GitHub Actions"

  linux:
    name: build Flutter Linux Flatpak
    needs: prepare
    runs-on: ubuntu-24.04
    container:
      # freedesktop-25.08, including the exact Platform/SDK commits checked by
      # scripts/package-flatpak.sh. Update all three pins together.
      image: ghcr.io/flathub-infra/flatpak-github-actions@sha256:bc5938197c339664f893828925061b08486e7f355c3e91eefcaae7293d3cfd6b
      options: --privileged
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - name: Trust container checkout ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_save: ${{ github.event_name == 'workflow_dispatch' }}
          install_args: flutter rust

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: flutter-linux-release
          save-if: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Expose Freedesktop SDK compilers to Flutter
        run: |
          set -euo pipefail
          # Flutter hard-codes these executable names. CMake identifies the
          # pinned SDK image's compilers as GNU and configures them accordingly.
          ln -s /usr/bin/gcc /app/bin/clang
          ln -s /usr/bin/g++ /app/bin/clang++
          dbus-uuidgen --ensure=/etc/machine-id
          clang++ --version

      - name: Build locked Flutter Linux client
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$RELEASE_SHA")"
          export SOURCE_DATE_EPOCH
          export TZ=UTC LC_ALL=C.UTF-8
          mise exec -C flutter -- flutter pub get --enforce-lockfile
          python3 scripts/patch-iroh-flutter.py flutter
          mise exec -C flutter -- flutter build linux --release --no-pub

      - name: Package and smoke-test Flatpak offline
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$RELEASE_SHA")"
          export SOURCE_DATE_EPOCH
          dbus-run-session -- bash scripts/package-flatpak.sh "$TAG"

      - name: Upload Linux Flatpak release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-linux-${{ needs.prepare.outputs.tag }}
          path: |
            dist/linux/*.flatpak
            dist/linux/*.flatpak.sha256
          if-no-files-found: error

  windows:
    name: build Flutter Windows bundle
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_save: ${{ github.event_name == 'workflow_dispatch' }}
          install_args: flutter rust

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: flutter-windows-release
          save-if: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and package Windows client
        shell: pwsh
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $flutter = Join-Path (mise where flutter) "bin/flutter.bat"
          $rustBin = Join-Path (mise where rust) "bin"
          $env:Path = "$rustBin;$env:Path"
          Push-Location flutter
          & $flutter pub get --enforce-lockfile
          Pop-Location
          python scripts/patch-iroh-flutter.py flutter
          Push-Location flutter
          & $flutter build windows --release --no-pub
          Pop-Location
          New-Item -ItemType Directory -Force dist/windows | Out-Null
          $archive = "dist/windows/zuko-windows-$env:TAG-x86_64.zip"
          Compress-Archive -Path flutter/build/windows/x64/runner/Release/* -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $(Split-Path -Leaf $archive)" | Set-Content -NoNewline "$archive.sha256"

      - name: Upload Windows release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-windows-${{ needs.prepare.outputs.tag }}
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: [prepare, build, android, ios-preview, linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keep the target repository explicit for `gh release create`.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
          actual_sha=$(git rev-list -n 1 "$TAG")
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "Refusing to publish: $TAG moved from $EXPECTED_SHA to $actual_sha" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Refusing to replace existing release $TAG" >&2
            exit 1
          fi
          echo "Publishing $TAG with:"
          ls -1 assets
          gh release create "$TAG" assets/* \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
