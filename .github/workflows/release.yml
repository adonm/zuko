name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: validate release identity
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.candidate.outputs.artifact_name }}
      candidate_run_id: ${{ steps.candidate.outputs.run_id }}
      sha: ${{ steps.identity.outputs.sha }}
      tag: ${{ steps.identity.outputs.tag }}
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release version and source
        id: identity
        env:
          TAG: ${{ github.ref_name }}
        run: scripts/release-context.sh "$TAG"

      - name: Resolve build-once release candidate
        id: candidate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/find_github_candidate.py "${{ steps.identity.outputs.sha }}"

  assets:
    name: validate and sign candidate assets
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download exact candidate artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: assets
          github-token: ${{ github.token }}
          run-id: ${{ needs.prepare.outputs.candidate_run_id }}

      - name: Verify candidate source and bytes
        run: >-
          python3 scripts/release_candidate.py verify
          "${{ needs.prepare.outputs.sha }}" assets

      - name: Set up Java 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android signing tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: build-tools;36.0.0

      - uses: ./.github/actions/setup-codemagic

      - name: Sign and verify exact Android artifacts
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: scripts/sign-android-release.sh "$TAG" assets

      - name: Remove non-published unsigned packages
        run: rm assets/*-unsigned.apk assets/*-unsigned.aab

      - name: Upload exact release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-release-assets-${{ needs.prepare.outputs.tag }}
          path: assets/*
          if-no-files-found: error
          compression-level: 0

  testflight:
    name: publish iOS TestFlight release
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Upload prevalidated iOS candidate through Codemagic
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: python3 scripts/publish-testflight-release.py "$TAG" "$RELEASE_SHA"

  release:
    name: publish GitHub Release
    needs: [prepare, assets, testflight]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zuko-release-assets-${{ needs.prepare.outputs.tag }}
          path: assets

      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: scripts/publish-github-release.sh "$TAG"

  appetize:
    name: publish Appetize previews
    needs: [prepare, release]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Upload exact release previews through Codemagic
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: python3 scripts/publish-appetize-release.py "$TAG" "$RELEASE_SHA"
