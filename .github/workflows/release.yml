name: release

# Builds release binaries for `zuko` and publishes them to GitHub Releases.
# The install script consumes these via mise's `github:` backend (one binary,
# both `zuko host` and `zuko connect`).
#
# Tools come from mise (mise.toml); the aarch64-linux cross-compiler comes from
# mise [bootstrap.packages]. CI just sets the matrix + target.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: validate release identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      sha: ${{ steps.identity.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Resolve release version and source
        id: identity
        env:
          TAG: ${{ github.ref_name }}
        run: mise exec -- just release-context "$TAG"

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: native on ubuntu (x86_64), cross on ubuntu (aarch64).
          # macOS: both targets build on Apple Silicon hardware (currently
          # macos-latest = macos-15) — Rust + Apple's `clang` cross-compile
          # x86_64-apple-darwin natively, so there's no need to wait on the
          # scarce (and shrinking) Intel macos-13 runner pool. Apple stopped
          # selling Intel Macs in 2020; building Intel binaries on Apple
          # Silicon is well-supported. Tracking macos-latest keeps us off
          # stale runner images without affecting the cross-compile target.
          #
          # `zuko app` is part of the normal Linux build; it is not wired into
          # non-Linux binaries. The Linux x86_64 tarball additionally
          # bundles cage + wlroots libs (see the "Bundle cage" step below).
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu,  cross: false }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true  }
          - { runner: macos-latest,  target: x86_64-apple-darwin,       cross: false }
          - { runner: macos-latest,  target: aarch64-apple-darwin,      cross: false }
    runs-on: ${{ matrix.runner }}
    env:
      ZUKO_TARGET: ${{ matrix.target }}
      ARTIFACT: zuko-${{ matrix.target }}.tar.gz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true


      - name: Install cross toolchain (linux aarch64)
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update
          mise bootstrap packages apply --yes apt:gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Select Xcode 26.3
        if: ${{ endsWith(matrix.target, '-apple-darwin') }}
        run: mise exec -- just select-xcode

      - name: Build release (target = ${{ matrix.target }})
        # The Linux target includes `zuko app`; non-Linux targets do not wire in
        # that subcommand, so the same command builds all platforms.
        run: mise exec -- just build-cli-release "$ZUKO_TARGET"

      - name: Bundle cage + libs (x86_64-linux only)
        # `zuko app` spawns cage headless (WLR_BACKENDS=headless WLR_RENDERER=pixman);
        # we ship cage next to the zuko binary so `mise use` delivers a working
        # app mode with no extra setup. Done in a Fedora container so the binary
        # matches what we tested (cage 0.3.0 + wlroots 0.20.1) regardless of the
        # Ubuntu runner. aarch64 cage bundling is a follow-up (needs QEMU); until
        # then aarch64 `zuko app` finds cage on PATH.
        # NOTE: no apostrophes inside the bash -c '...' block — they close the
        # single-quoted argument and break the quoting.
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: mise exec -- just bundle-cage

      - name: Package
        run: mise exec -- just package-cli-release "$ZUKO_TARGET"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          if-no-files-found: error

  flutter:
    name: collect Codemagic Flutter release artifacts
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Build and collect exact Codemagic artifacts
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: >-
          python3 scripts/collect-codemagic-release.py
          "$TAG" "$RELEASE_SHA" codemagic-assets

      - name: Set up Java 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android signing tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools
            build-tools;36.0.0

      - uses: ./.github/actions/setup-codemagic

      - name: Sign and verify exact Android artifacts
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: scripts/sign-codemagic-android-release.sh "$TAG" codemagic-assets

      - name: Upload collected Flutter release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-${{ needs.prepare.outputs.tag }}
          path: codemagic-assets/*
          if-no-files-found: error

  testflight:
    name: publish iOS TestFlight release
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Validate and publish exact iOS release through Codemagic
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: python3 scripts/publish-testflight-release.py "$TAG" "$RELEASE_SHA"

  release:
    name: publish GitHub Release
    needs: [prepare, build, flutter]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: zuko-*
          path: assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keep the target repository explicit for `gh release create`.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: mise exec -- just publish-github-release "$TAG"

  appetize:
    name: publish Appetize previews
    needs: [prepare, release]
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Publish exact release to Appetize
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: python3 scripts/publish-appetize-release.py "$TAG" "$RELEASE_SHA"
