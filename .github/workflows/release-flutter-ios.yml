name: release-flutter-ios

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Build a signed IPA or upload an existing validated artifact"
        type: choice
        default: build
        options:
          - build
          - upload-artifact
      tag:
        description: "Immutable release tag for artifact upload (vX.Y.Z)"
        required: false
        type: string
      artifact_run_id:
        description: "Successful release-flutter-ios run containing the signed IPA"
        required: false
        type: string
      ipa_sha256:
        description: "Expected SHA-256 of the signed IPA"
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: testflight-dev-adonm-zuko
  cancel-in-progress: false

jobs:
  build:
    if: ${{ inputs.lane == 'build' }}
    name: signed Flutter iOS (GitHub validation only)
    runs-on: macos-latest
    timeout-minutes: 120
    environment: apple-store
    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Resolve release metadata
        run: mise exec -- just build-context

      # Zig 0.15.2 cannot parse the arm64e-macos exports in Xcode 26.6's
      # macOS 26.5 libSystem.tbd while compiling Ghostty's host build runner.
      # Xcode 26.3 is installed on current macOS 15/26 images and is proven by
      # the accepted TestFlight build. Fail closed if the pinned SDK disappears.
      - name: Select Xcode 26.3
        run: mise exec -- just select-xcode

      - uses: ./.github/actions/setup-codemagic

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-${{ runner.arch }}-flutter-ios-store-${{ hashFiles('flutter/pubspec.lock', 'scripts/prepare-libghostty-ios-static.py') }}


      - name: Analyze and test shared client
        run: mise exec -- just flutter-check

      - name: Prepare App Store-compatible Ghostty library
        run: mise exec -- just prepare-ios-ghostty

      - name: Configure App Store signing with Codemagic
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: mise exec -- just configure-apple-signing ios

      - name: Build signed Flutter IPA
        run: mise exec -- just build-ios-store

      - name: Validate signed IPA
        id: package
        run: mise exec -- just package-ios-store

      - name: Upload signed IPA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-ios-${{ env.ZUKO_VERSION }}-${{ env.ZUKO_BUILD_NUMBER }}
          path: |
            dist/flutter-ios/Zuko-Flutter.ipa
            dist/flutter-ios/Zuko-Flutter.ipa.sha256
          if-no-files-found: error
          retention-days: 7

  upload-artifact:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.lane == 'upload-artifact' }}
    name: upload validated IPA to TestFlight
    runs-on: macos-latest
    timeout-minutes: 30
    environment: apple-store
    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Resolve release metadata
        id: release
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$TAG" ]; then
            echo "tag is required for the upload-artifact lane" >&2
            exit 1
          fi
          mise exec -- just release-context "$TAG"

      - name: Verify source artifact provenance
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.artifact_run_id }}
          EXPECTED_SHA: ${{ steps.release.outputs.sha }}
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_BUILD: ${{ steps.release.outputs.version_code }}
          EXPECTED_IPA_SHA256: ${{ inputs.ipa_sha256 }}
        run: |
          if [[ ! "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "artifact_run_id must be a numeric Actions run ID" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_IPA_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "ipa_sha256 must be a lowercase SHA-256 digest" >&2
            exit 1
          fi

          source_run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID")"
          source_workflow="$(jq -r .workflow_id <<< "$source_run")"
          expected_workflow="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/release-flutter-ios.yml" --jq .id)"
          test "$(jq -r .status <<< "$source_run")" = completed
          test "$(jq -r .conclusion <<< "$source_run")" = success
          test "$(jq -r .event <<< "$source_run")" = workflow_dispatch
          test "$(jq -r .head_sha <<< "$source_run")" = "$EXPECTED_SHA"
          test "$source_workflow" = "$expected_workflow"

          artifact_name="zuko-flutter-ios-$EXPECTED_VERSION-$EXPECTED_BUILD"
          artifact_count="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/artifacts" \
              --jq "[.artifacts[] | select(.name == \"$artifact_name\" and .expired == false)] | length"
          )"
          if [ "$artifact_count" != 1 ]; then
            echo "expected one unexpired $artifact_name artifact, found $artifact_count" >&2
            exit 1
          fi
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Download signed IPA from verified run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.source.outputs.artifact_name }}
          path: dist/flutter-ios
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Select Xcode 26.3
        run: mise exec -- just select-xcode

      - uses: ./.github/actions/setup-codemagic

      - name: Revalidate recovered IPA
        env:
          EXPECTED_IPA_SHA256: ${{ inputs.ipa_sha256 }}
        run: |
          readonly ipa="$PWD/dist/flutter-ios/Zuko-Flutter.ipa"
          test -f "$ipa"
          actual_sha="$(shasum -a 256 "$ipa" | awk '{print $1}')"
          if [ "$actual_sha" != "$EXPECTED_IPA_SHA256" ]; then
            echo "IPA SHA-256 is $actual_sha, expected $EXPECTED_IPA_SHA256" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/recovered.xcarchive"
          scripts/apple-validate-package.sh ios \
            "$RUNNER_TEMP/recovered.xcarchive" "$ipa" \
            "$ZUKO_VERSION" "$ZUKO_BUILD_NUMBER"

      - name: Upload recovered IPA to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mise exec -- just upload-apple-store ios \
            "$PWD/dist/flutter-ios/Zuko-Flutter.ipa"
