name: release-flutter-ios

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: testflight-dev-adonm-zuko
  cancel-in-progress: false

jobs:
  build:
    name: signed Flutter iOS (${{ github.event_name == 'push' && 'TestFlight' || 'validation only' }})
    runs-on: macos-latest
    timeout-minutes: 120
    environment: apple-store
    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up repository tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Resolve release metadata
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = push ]; then
            mise exec -- just release-context "$TAG"
          else
            mise exec -- just build-context
          fi

      # Zig 0.15.2 cannot parse the arm64e-macos exports in Xcode 26.6's
      # macOS 26.5 libSystem.tbd while compiling Ghostty's host build runner.
      # Xcode 26.3 is installed on current macOS 15/26 images and is proven by
      # the accepted TestFlight build. Fail closed if the pinned SDK disappears.
      - name: Select Xcode 26.3
        run: mise exec -- just select-xcode

      - uses: ./.github/actions/setup-codemagic

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-${{ runner.arch }}-flutter-ios-store-${{ hashFiles('flutter/pubspec.lock', 'scripts/prepare-libghostty-ios-static.py') }}


      - name: Analyze and test shared client
        run: mise exec -- just flutter-check

      - name: Prepare App Store-compatible Ghostty library
        run: mise exec -- just prepare-ios-ghostty

      - name: Configure App Store signing with Codemagic
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: mise exec -- just configure-apple-signing ios

      - name: Build signed Flutter IPA
        run: mise exec -- just build-ios-store

      - name: Validate signed IPA
        id: package
        run: mise exec -- just package-ios-store

      - name: Upload signed IPA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-ios-${{ env.ZUKO_VERSION }}-${{ env.ZUKO_BUILD_NUMBER }}
          path: |
            dist/flutter-ios/Zuko-Flutter.ipa
            dist/flutter-ios/Zuko-Flutter.ipa.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload to TestFlight
        # Manual dispatch is intentionally a non-publishing signing smoke test.
        if: ${{ github.event_name == 'push' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          IPA_PATH: ${{ steps.package.outputs.ipa }}
        run: mise exec -- just upload-apple-store ios "$IPA_PATH"
