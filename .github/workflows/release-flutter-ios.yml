name: release-flutter-ios

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release version to build from main (vX.Y.Z)"
        required: true
        type: string
      lane:
        description: "Build a signed artifact or upload it to TestFlight"
        type: choice
        default: build
        options:
          - build
          - beta

permissions:
  contents: read

concurrency:
  group: testflight-dev-adonm-zuko
  cancel-in-progress: false

jobs:
  build:
    name: signed Flutter iOS (${{ github.event_name == 'push' && 'beta' || inputs.lane }})
    runs-on: macos-latest
    timeout-minutes: 120
    environment: apple-store
    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve release metadata
        env:
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: scripts/release-context.sh "$TAG" apple-build-number

      # Zig 0.15.2 cannot parse the arm64e-macos exports in Xcode 26.6's
      # macOS 26.5 libSystem.tbd while compiling Ghostty's host build runner.
      # Xcode 26.3 is installed on current macOS 15/26 images and is proven by
      # the accepted TestFlight build. Fail closed if the pinned SDK disappears.
      - name: Select Xcode 26.3
        run: scripts/select-xcode.sh

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          install_args: rust just zig@0.15.2

      - uses: ./.github/actions/setup-flutter

      - uses: ./.github/actions/setup-codemagic

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-${{ runner.arch }}-flutter-ios-store-${{ hashFiles('flutter/pubspec.lock', 'scripts/prepare-libghostty-ios-static.py') }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: flutter-ios-release

      - name: Analyze and test shared client
        run: mise run flutter-check

      - name: Prepare App Store-compatible Ghostty library
        run: |
          set -euo pipefail
          python3 scripts/prepare-libghostty-ios-static.py

      - name: Configure App Store signing with Codemagic
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: scripts/apple-setup-signing.sh ios

      - name: Build signed Flutter IPA
        run: |
          set -euo pipefail
          cd flutter
          mise exec zig@0.15.2 -- flutter build ipa \
            --release \
            --no-pub \
            --build-name "$ZUKO_VERSION" \
            --build-number "$ZUKO_BUILD_NUMBER" \
            --export-options-plist "$APPLE_EXPORT_OPTIONS"

      - name: Validate signed IPA
        id: package
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(flutter/build/ios/archive/*.xcarchive)
          ipas=(flutter/build/ios/ipa/*.ipa)
          [ "${#archives[@]}" -eq 1 ]
          [ "${#ipas[@]}" -eq 1 ]
          archive="${archives[0]}"
          ipa="${ipas[0]}"
          scripts/apple-validate-package.sh ios "$archive" "$ipa" \
            "$ZUKO_VERSION" "$ZUKO_BUILD_NUMBER"
          mkdir -p dist/flutter-ios
          cp "$ipa" dist/flutter-ios/Zuko-Flutter.ipa
          (cd dist/flutter-ios && shasum -a 256 Zuko-Flutter.ipa > Zuko-Flutter.ipa.sha256)
          echo "ipa=$PWD/dist/flutter-ios/Zuko-Flutter.ipa" >> "$GITHUB_OUTPUT"

      - name: Upload signed IPA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuko-flutter-ios-${{ env.ZUKO_VERSION }}-${{ env.ZUKO_BUILD_NUMBER }}
          path: |
            dist/flutter-ios/Zuko-Flutter.ipa
            dist/flutter-ios/Zuko-Flutter.ipa.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload to TestFlight
        # Release tags always upload. A manual run can still select `build` to
        # validate signing without consuming a TestFlight build number.
        if: ${{ github.event_name == 'push' || inputs.lane == 'beta' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          IPA_PATH: ${{ steps.package.outputs.ipa }}
        run: |
          set -euo pipefail
          scripts/apple-upload.sh ios "$IPA_PATH"
