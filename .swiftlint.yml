# SwiftLint config for the Zuko iOS app.
# Install:  `mise install`  (swiftlint is in [tools])
# Run:      `mise run lint`
# CI:       build-ios.yml runs this before the expensive FFI + xtool build
#           steps so style/correctness issues fail fast (seconds, not minutes).

included:
  - ios/Zuko

# Generated by uniffi-bindgen (scripts/build-ffi.sh) — not hand-maintained.
excluded:
  - ios/ZukoFFI

disabled_rules:
  # Short names are idiomatic in Swift closures/loops (`i`, `n`, `c`, `m`).
  - identifier_name
  # Trailing commas in collection literals are common Swift style.
  - trailing_comma
  # Nesting is intentional for private implementation types.
  - nesting

# Opt into a few beyond SwiftLint's defaults that catch real bugs in
# asynchronous terminal code (force unwraps crash, force casts crash, etc.).
opt_in_rules:
  - force_unwrapping
  - force_cast
  - implicitly_unwrapped_optional
  - empty_count
  - first_where
  - operator_usage_whitespace
  - sorted_imports
  - yoda_condition

line_length:
  warning: 200
  error: 350

type_body_length:
  warning: 500
  error: 800
