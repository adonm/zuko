name: zuko
description: Private remote shells over Iroh for Android, Apple platforms, web, Linux, and Windows.
publish_to: 'none'
version: 0.10.7+1800010007

environment:
  sdk: ^3.12.2

hooks:
  user_defines:
    libghostty:
      source: compile
      download: tarball

dependencies:
  flutter:
    sdk: flutter
  crypto: 3.0.7
  flterm:
    git:
      url: https://github.com/adonm/libghostty.git
      ref: 9e0b2afc5e04040b15f6dd11cfd07ad6dfc74470
      path: packages/flterm
  flutter_secure_storage: 10.3.1
  iroh_flutter: 1.0.1
  libghostty: ^0.0.11
  mobile_scanner: 7.2.0
  pointycastle: 4.0.0
  url_launcher: 6.3.2
  yaru: 10.2.0

dependency_overrides:
  libghostty:
    git:
      url: https://github.com/adonm/libghostty.git
      ref: 9e0b2afc5e04040b15f6dd11cfd07ad6dfc74470
      path: packages/libghostty

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  config:
    enable-swift-package-manager: false
    linux-gtk-default: gtk4
  uses-material-design: true
  assets:
    - assets/zuko-logo.png
    - assets/fonts/
  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: Noto Sans Mono
      fonts:
        - asset: assets/fonts/NotoSansMono.ttf
    - family: Noto Emoji
      fonts:
        - asset: assets/fonts/NotoEmoji-Regular.ttf
    - family: Noto Sans Symbols 2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
    - family: JetBrainsMono Nerd Font Mono
      fonts:
        - asset: assets/fonts/JetBrainsMonoNerdFontMono-Regular.ttf
    - family: Noto Sans JP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.otf
    - family: Noto Sans KR
      fonts:
        - asset: assets/fonts/NotoSansKR-Regular.otf
