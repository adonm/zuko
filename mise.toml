# Single source of truth for tool versions, environment, and bootstrap
# dependencies. Human-facing and CI operations live in Justfile.
# Local: `mise bootstrap`, then `just <recipe>` in an activated shell.
# Explicit: `mise exec -- just <recipe>`.

[tools]
# iroh 1.0's dependency tree needs edition2024 (Rust 1.85+).
rust = { version = "1.96.1", components = "clippy,rustfmt" }
zig = "0.15.2"
just = "1.55.1"
mdbook = "0.5.4"
lychee = "0.24.2"
actionlint = "1.7.12"
hk = "1.50.0"

# Official beta archives for framework revision
# 677d472756f83c14371dd8cc624387065f3d32a7. Platform checksums come from
# Flutter's published release manifests.
[tools."http:flutter"]
version = "3.46.0-0.3.pre"

[tools."http:flutter".platforms]
linux-x64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/beta/linux/flutter_linux_3.46.0-0.3.pre-beta.tar.xz", checksum = "sha256:931c30fde3cc9b4eae2bbae750914c1ec60bfea4d46531e37f25caaa1a47d2da" }
macos-x64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/beta/macos/flutter_macos_3.46.0-0.3.pre-beta.zip", checksum = "sha256:788df8e91c57880b0559ceeb8e09021bbc841bd2e03f3e8d1a149cd127735f86" }
macos-arm64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/beta/macos/flutter_macos_arm64_3.46.0-0.3.pre-beta.zip", checksum = "sha256:5191b391f00a8e3756c873e27326af01b62c40c152d8cfd4b490b9ed8a3530f0" }
windows-x64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/beta/windows/flutter_windows_3.46.0-0.3.pre-beta.zip", checksum = "sha256:11e5b04a443f0a764ddcf36b53dca811f65f859b6074f7e4a3e8591075d572ed" }

# System-level dependencies used by Linux builds. `mise bootstrap` installs
# only entries for package managers available on the current OS.
[bootstrap.packages]
"apt:gcc-aarch64-linux-gnu" = "latest"
"apt:clang" = "latest"
"apt:cmake" = "latest"
"apt:libgtk-3-dev" = "latest"
"apt:libsecret-1-dev" = "latest"
"apt:ninja-build" = "latest"
"apt:pkg-config" = "latest"
"dnf:clang" = "latest"
"dnf:cmake" = "latest"
"dnf:gtk3-devel" = "latest"
"dnf:libsecret-devel" = "latest"
"dnf:ninja-build" = "latest"
"dnf:pkgconf-pkg-config" = "latest"
"pacman:clang" = "latest"
"pacman:cmake" = "latest"
"pacman:gtk3" = "latest"
"pacman:libsecret" = "latest"
"pacman:ninja" = "latest"
"pacman:pkgconf" = "latest"

[bootstrap.mise_shell_activate]
bashrc = "activate"
zshrc = "activate"
fish = "activate"

[settings]
experimental = true

[env]
CARGO_TERM_COLOR = "always"
CODEMAGIC_APP_ID = "6a52dc14add8531e99f88b8a"
ZUKO_FLUTTER_REVISION = "677d472756f83c14371dd8cc624387065f3d32a7"
