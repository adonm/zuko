# Single source of truth for tools, system deps, and tasks.
# Local dev:   `mise install`  then  `mise run <task>`
# CI:          `jdx/mise-action` (runs `mise install`) then `mise run <task>`
#
# iOS app builds additionally need xcodegen — see `mise.ios.toml`, activated
# with `MISE_ENV=ios mise install` (the ios CI job sets MISE_ENV=ios).

[tools]
# iroh 1.0's dependency tree needs edition2024 (Rust 1.85+); track latest stable.
# `profile = "default"` guarantees clippy + rustfmt (CI runners default to minimal).
rust = { version = "latest", profile = "default" }

# System-level deps needed for builds. `mise bootstrap packages install`
# installs only the ones applicable to the current OS/package manager.
# Used by the release workflow to cross-compile the linux/arm64 binary.
[bootstrap.packages]
"apt:gcc-aarch64-linux-gnu" = "latest" # cross linker for aarch64-unknown-linux-gnu
"apt:shellcheck" = "latest"
"brew:shellcheck" = "latest"

[env]
CARGO_TERM_COLOR = "always"

# --- tasks (shared by local dev and CI) ---

[tasks.build-host]
description = "Build the zuko-host release binary (native target)"
run = "cargo build --release --manifest-path host/Cargo.toml"

[tasks.test-host]
description = "Clippy + unit tests for zuko-host"
run = [
    "cargo clippy --all-targets --manifest-path host/Cargo.toml -- -D warnings",
    "cargo test --manifest-path host/Cargo.toml",
]

[tasks.build-ios]
description = "Generate the Xcode project and build the iOS app (iOS Simulator, unsigned). macOS only."
run = [
    "xcodegen --spec ios/Zuko/project.yml generate",
    "xcodebuild -resolvePackageDependencies -project ios/Zuko/Zuko.xcodeproj -scheme Zuko",
    "xcodebuild build -project ios/Zuko/Zuko.xcodeproj -scheme Zuko -destination 'generic/platform=iOS Simulator' -derivedDataPath ios/Zuko/build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO",
]

[tasks.run-host]
description = "Run zuko-host in the foreground (mise shim or local debug build)"
run = "sh host/scripts/zuko-host.sh"
