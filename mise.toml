# Single source of truth for tools, system deps, and tasks.
# Local dev:   `mise install`  then  `mise run <task>`
# CI:          `jdx/mise-action` (runs `mise install`) then `mise run <task>`
#
# iOS local builds use xtool. Fastlane/XcodeGen are kept only for the signed
# App Store/TestFlight workflow until xtool grows an App Store export path.

[tools]
# iroh 1.0's dependency tree needs edition2024 (Rust 1.85+); track latest stable.
# `components` explicitly pins clippy + rustfmt (CI runners default to the
# 'minimal' profile, and `Swatinem/rust-cache` can restore a toolchain without
# them — see the matching `rustup component add` step in the workflows).
rust = { version = "latest", components = "clippy,rustfmt" }
# SwiftLint for the iOS app. Installed + shimmed by mise on Linux (static
# binary from realm/SwiftLint releases) and macOS. `mise run lint` uses it.
swiftlint = "latest"

# System-level deps used by builds. `mise bootstrap packages install` installs
# only the ones for the current OS/package manager. Just the linux/arm64
# cross-compiler here (used by the release workflow).
[bootstrap.packages]
"apt:gcc-aarch64-linux-gnu" = "latest" # cross linker for aarch64-unknown-linux-gnu
# Swift toolchain for local xtool/iOS work. Lives in bootstrap (not [tools])
# because (a) Homebrew's `swift` formula is the only reliable Linux install
# path on Bluefin, and (b) it's ~1.5 GB — opting in via `mise bootstrap`
# keeps it off Rust-only contributors who never touch the iOS app. Anyone
# iterating on ios/ runs `mise bootstrap packages install --yes` once.
"brew:swift" = "latest"

[settings]
# `mise bootstrap` (used for [bootstrap.packages]) is still experimental.
experimental = true

[env]
CARGO_TERM_COLOR = "always"

# --- tasks (shared by local dev and CI) ---

[tasks.build]
description = "Build the zuko release binary (native target)"
run = "cargo build --release"

[tasks.test]
description = "Clippy + unit tests for zuko (host + client + share/claim). Skips the network-gated e2e test (run `mise run test-e2e` for that)."
run = [
    "cargo clippy --all-targets -- -D warnings",
    "cargo test",
]

[tasks.test-e2e]
description = "End-to-end PTY harness (host<->connect + share<->claim) against the live Iroh network. Needs network. Runs the #[ignore] e2e integration test in tests/e2e.rs."
run = "cargo test --release --test e2e -- --ignored --nocapture"

[tasks.build-ffi]
description = "Build ZukoRust.xcframework + regenerate Swift bindings for the iOS app. Set ZUKO_FFI_DEVICE_ONLY=1 for xtool's default device-only build."
run = "sh scripts/build-ffi.sh"

[tasks.build-ios]
description = "Build the iOS app with xtool. One command for local dev and CI: builds FFI, patches plist/frameworks, emits ios/xtool/Zuko.app."
run = "sh scripts/build-ios-xtool.sh"

[tasks.setup-ios-sdk]
description = "Install the cached Darwin Swift SDK bundle for Linux xtool iOS builds. Idempotent; build-ios runs this automatically when needed."
run = "sh scripts/setup-ios-sdk.sh"

[tasks.setup-ios]
description = "Install local iOS build tooling for xtool. macOS: xtool tap. Linux: Homebrew Swift/libxml2 + xtool AppImage."
run = """
case "$(uname -s)" in
    Linux)
        if command -v mise >/dev/null 2>&1; then
            mise bootstrap packages install --yes
        fi
        BREW="$(command -v brew || command -v /home/linuxbrew/.linuxbrew/bin/brew || true)"
        if [ -z "$BREW" ]; then
            echo "setup-ios: Homebrew is required for Swift on Linux" >&2
            exit 1
        fi
        "$BREW" install swift libxml2
        "$BREW" link --overwrite --force swift libxml2 || true
        BREW_PREFIX="$($BREW --prefix)"
        export PATH="$BREW_PREFIX/bin:$BREW_PREFIX/sbin:$PATH"

        ld_libs=""
        for d in "$BREW_PREFIX"/opt/*/lib; do
            [ -d "$d" ] || continue
            if [ -z "$ld_libs" ]; then ld_libs="$d"; else ld_libs="$ld_libs:$d"; fi
        done
        export LD_LIBRARY_PATH="${ld_libs}${LD_LIBRARY_PATH+:${LD_LIBRARY_PATH}}"
        if [ -n "${GITHUB_PATH:-}" ]; then
            {
                echo "$BREW_PREFIX/bin"
                echo "$BREW_PREFIX/sbin"
            } >> "$GITHUB_PATH"
        fi
        if [ -n "${GITHUB_ENV:-}" ]; then
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
        fi
        ;;
esac

mise run setup-xtool
swift --version
"""

[tasks.setup-ios-release]
description = "Install legacy signed-release tooling (xcodegen + fastlane). Used only by release-ios.yml."
run = "brew install xcodegen fastlane"

[tasks.setup-xtool]
description = "Install xtool (cross-platform Xcode replacement). macOS: via the xtool-org Homebrew tap. Linux: the AppImage from GitHub releases. Pairs with `mise bootstrap packages install --yes` on Linux (which installs swift via Homebrew)."
run = """
case "$(uname -s)" in
    Darwin)
        brew install xtool-org/tap/xtool
        ;;
    Linux)
        mkdir -p "$HOME/.local/bin"
        curl -fL "https://github.com/xtool-org/xtool/releases/latest/download/xtool-$(uname -m).AppImage" \
            -o "$HOME/.local/bin/xtool"
        chmod +x "$HOME/.local/bin/xtool"
        export PATH="$HOME/.local/bin:$PATH"
        if [ -n "${GITHUB_PATH:-}" ]; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        fi
        ;;
    *)
        echo "setup-xtool: unsupported OS $(uname -s)" >&2
        exit 2
        ;;
esac
xtool --version
"""

[tasks.lint]
description = "Run SwiftLint on the iOS Swift sources. Works on Linux (swiftlint-static, no SourceKit needed) and macOS (swiftlint from brew/mise). `mise install` brings the tool."
run = """
if command -v swiftlint-static >/dev/null 2>&1; then
    swiftlint-static --config .swiftlint.yml ios/Zuko
else
    swiftlint --config .swiftlint.yml ios/Zuko
fi
"""

[tasks.setup-ios-signing]
description = "One-time Apple signing setup for the iOS TestFlight pipeline. Generates cert+profile material, walks you through the developer-portal dance, and pushes the 7 GH Actions secrets via `gh`. No Mac needed. See ios/DISTRIBUTION.md."
run = "sh scripts/setup-ios-signing.sh"

[tasks.ios-signing-status]
description = "Check local iOS signing artifacts under ~/.config/zuko/ios-signing without printing secrets."
run = """
dir="${ZUKO_IOS_SIGNING_DIR:-$HOME/.config/zuko/ios-signing}"
missing=0
echo "iOS signing workspace: $dir"
for f in zuko.key zuko.csr zuko.cer zuko.p12 p12-password Zuko_AppStore.mobileprovision team-id asc-key-id asc-issuer-id; do
    if [ -f "$dir/$f" ]; then
        echo "  ok:      $f"
    else
        echo "  missing: $f"
        missing=1
    fi
done
if ! ls "$dir"/AuthKey_*.p8 >/dev/null 2>&1; then
    echo "  missing: AuthKey_*.p8"
    missing=1
else
    echo "  ok:      AuthKey_*.p8"
fi
if [ "$missing" -ne 0 ]; then
    echo "Run: mise run setup-ios-signing"
    exit 1
fi
"""

[tasks.run-host]
description = "Run `zuko host` in the foreground (mise shim or local debug build)"
run = "sh scripts/zuko-host.sh"

[tasks.release]
description = "Cut a release: commit pending work, push, tag vX.Y.Z, push tag (triggers release.yml). Pass the version, e.g. `mise run release v0.1.0`."
run = "sh scripts/release.sh ${@}"

# ──────────────────────────── hooks ─────────────────────────────────
# See https://mise.jdx.dev/hooks.html. All hooks fire only when
# `mise activate` is set up in the user's shell — they're no-ops
# otherwise (CI included, which is fine: CI runs tasks explicitly).
#
# Design:
#   - `enter` is a one-shot status snapshot (cheap, no builds).
#   - `watch_files` runs *fast* checks on save: cargo fmt + clippy
#     (Rust), swiftlint (Swift). Output is short — keeps the editor
#     pane readable.
#   - The slow full xtool iOS build is NOT in watch_files — it's too
#     disruptive for iterative dev. Run `mise run preflight` manually
#     before pushing if you've touched iOS build config.

[hooks.enter]
# Run once when entering the project. Quick environment snapshot only —
# no builds, no tests, no network. Surfaces:
#   - rust toolchain version (always)
#   - swift + xtool versions (if present; iOS dev is opt-in)
#   - whether the .xtoolsdk is installed (on Linux; gates xtool dev build)
# The goal is a glance-able status line so you immediately know if
# something's off before you start a build.
run = """
echo "zuko dev env:"
echo "  rust:   $(cargo --version 2>/dev/null || echo 'missing — run mise install')"
if command -v xtool >/dev/null 2>&1; then
    echo "  xtool:  $(xtool --version 2>/dev/null)"
fi
if command -v swift >/dev/null 2>&1; then
    echo "  swift:  $(swift --version 2>/dev/null | head -1)"
    sdk_status="$(xtool sdk status 2>&1 || true)"
    if printf '%s\n' "$sdk_status" | grep -qi 'not installed'; then
        echo "  ios SDK: not installed (run 'mise run setup-ios' on macOS,"
        echo "           or install the SDK bundle from bootstrap-xtoolsdk.yml on Linux)"
    else
        echo "  ios SDK: $(printf '%s\n' "$sdk_status" | head -1)"
    fi
fi
signing_dir="${ZUKO_IOS_SIGNING_DIR:-$HOME/.config/zuko/ios-signing}"
if [ -d "$signing_dir" ]; then
    if [ -f "$signing_dir/zuko.p12" ] && [ -f "$signing_dir/Zuko_AppStore.mobileprovision" ] && ls "$signing_dir"/AuthKey_*.p8 >/dev/null 2>&1; then
        echo "  iOS signing: configured ($signing_dir)"
    else
        echo "  iOS signing: incomplete (run 'mise run setup-ios-signing' if you need TestFlight)"
    fi
else
    echo "  iOS signing: not set up (run 'mise run setup-ios-signing' if you need TestFlight)"
fi
"""

# ────────────── watch_files: fast checks on every save ──────────────

[[watch_files]]
# cargo fmt is instant and runs unconditionally on every Rust save.
# Auto-fixes in place; noisy diffs print to the editor pane so you see
# what changed.
patterns = ["src/**/*.rs", "tests/**/*.rs", "uniffi-bindgen.rs"]
run = "cargo fmt"

[[watch_files]]
# `cargo check` is what we'd actually want here (faster than clippy for
# save-time feedback), but it doesn't auto-fix. Clippy does lint-grade
# analysis with decent incremental speed; the watch_files output
# surfaces warnings without aborting the editor session.
patterns = ["src/**/*.rs", "Cargo.toml", "Cargo.lock"]
run = "cargo clippy --quiet --message-format=short 2>&1 | tail -5"

[[watch_files]]
# SwiftLint is the iOS-side equivalent of cargo clippy — fast, no build.
# Runs against the same config CI uses (.swiftlint.yml), so warnings
# match what PR check will flag.
patterns = ["ios/Zuko/Zuko/**/*.swift", ".swiftlint.yml"]
run = """
if command -v swiftlint >/dev/null 2>&1; then
    swiftlint --config .swiftlint.yml ios/Zuko --quiet
else
    echo "(swiftlint not installed — run 'mise install')"
fi
"""

# ──────────────────── explicit check / preflight tasks ──────────────
# These don't auto-run; they're what you call before `git push` to
# mirror what CI is going to do. `check` is the fast subset (~10s);
# `preflight` is everything CI runs including the iOS build (~3 min).

[tasks.check]
description = "Fast pre-push checks: cargo fmt --check + clippy + tests + swiftlint. ~10-30s. Mirrors what the build.yml job runs."
run = [
    "cargo fmt --check",
    "cargo clippy --all-targets -- -D warnings",
    "cargo test",
    """
if command -v swiftlint >/dev/null 2>&1; then
    swiftlint --config .swiftlint.yml ios/Zuko --strict
else
    echo "(skipping swiftlint — not installed)"
fi
""",
]

[tasks.preflight]
description = "Full local CI mirror: 'mise run check' + 'mise run build-ios' (xtool build). ~3 min. Run before pushing if you've touched iOS code."
depends = ["check"]
run = """
if ! command -v xtool >/dev/null 2>&1; then
    echo "preflight: xtool not installed — skipping iOS build (run 'mise run setup-xtool' to enable)"
    exit 0
fi
sdk_status="$(xtool sdk status 2>&1 || true)"
if printf '%s\n' "$sdk_status" | grep -qi 'not installed'; then
    if [ "$(uname -s)" = "Linux" ]; then
        mise run setup-ios-sdk
    else
        echo "preflight: iOS SDK not installed — skipping iOS build"
        exit 0
    fi
fi
mise run build-ios
"""
